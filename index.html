<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri Panel</title><style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    background:#050b17;
    color:white;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

.tab-btn{
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px 16px;
    border-radius:6px;
    cursor:pointer;
}

.tab-btn.active{
    border-color:#ffb300;
    transform:scale(1.05);
}

.container{
    position:relative;
    width:100%;
}

.tab-content{
    position:absolute;
    width:100%;
    opacity:0;
    transform:translateX(30px);
    transition:.4s;
    pointer-events:none;
}

.tab-content.active{
    opacity:1;
    transform:translateX(0);
    position:relative;
    pointer-events:auto;
}

textarea{
    width:100%;
    height:180px;
    background:#0d1628;
    color:white;
    border:1px solid #23324d;
    padding:12px;
}

.output{
    width:100%;
    min-height:180px;
    background:#0d1628;
    border:1px solid #23324d;
    padding:12px;
    white-space:pre-wrap;
}

button{
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px 14px;
    margin-right:10px;
    border-radius:6px;
    cursor:pointer;
}

.bad-word{
    color:#ff2b2b;
    font-weight:800;
    background:rgba(255,0,0,0.12);
    padding:2px 4px;
    border-radius:4px;
}

.watermark{
    position:fixed;
    bottom:15px;
    left:0;
    width:100%;
    text-align:center;
    font-size:46px;
    font-weight:900;
    letter-spacing:10px;
    pointer-events:none;
    user-select:none;

    background:linear-gradient(90deg,#ffb300,#ff5500,#fff,#ff5500,#ffb300);
    background-size:300% 100%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation: glow 4s linear infinite, pulse 2s ease-in-out infinite;
}

@keyframes glow{
    0%{background-position:0%;}
    100%{background-position:300%;}
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
}
</style></head><body><div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Boşluk Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım Düzenleyici</button>
</div><div class="container"><div class="tab-content active"><h3>Metni buraya yapıştır aslan parçası</h3><textarea id="input1"></textarea><button onclick="cleanSpaces()">Temizle</button>
<button onclick="copy1()">Kopyala</button>
<button onclick="clear1()">Sil</button>

<div id="output1" class="output" contenteditable="true"></div></div><div class="tab-content"><h3>Metni buraya yapıştır aslan parçası</h3><textarea id="input2"></textarea><button onclick="fixText()">Düzelt</button>
<button onclick="copy2()">Kopyala</button>
<button onclick="clear2()">Sil</button>

<div id="output2" class="output" contenteditable="true"></div></div></div><div class="watermark">⚔️ TENGRİ ⚔️</div><script>/* TAB */
function openTab(i){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));

    document.querySelectorAll(".tab-content")[i].classList.add("active");
    document.querySelectorAll(".tab-btn")[i].classList.add("active");
}

/* YASAKLI KELİMELER */
const bannedWords = [
    "yüksek kalite",
    "yüksek kaliteli",
    "hakiki deri",
    "gerçek deri",
    "%100 deri",
    "% 100 deri",
    "birinci sınıf",
    "1. kalite",
    "1. sınıf",
    "unisex"
];

function escapeRegExp(str){
    return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}

function highlight(text){

    bannedWords.forEach(word=>{
        const pattern = escapeRegExp(word).replace(/\s+/g,"\\s+");
        const reg = new RegExp(pattern,"gi");

        text = text.replace(reg, m=>{
            return `<span class="bad-word">${m}</span>`;
        });
    });

    return text;
}

/* TAB 1 - BOŞLUK TEMİZLEYİCİ */
function cleanSpaces(){

    let t = document.getElementById("input1").value;

    // NBSP temizliği
    t = t
        .replace(/&nbsp;/gi," ")
        .replace(/nbsp;/gi," ")
        .replace(/;nbsp/gi," ")
        .replace(/\u00A0/g," ");

    // Satırları koru, boş satırları kaldır
    t = t
        .split("\n")
        .map(line => line.replace(/[ \t]+/g," ").trim())
        .filter(line => line.length > 0)
        .join("\n");

    document.getElementById("output1").innerHTML = highlight(t);
}

function copy1(){
    navigator.clipboard.writeText(
        document.getElementById("output1").innerText
    );
}

function clear1(){
    document.getElementById("input1").value="";
    document.getElementById("output1").innerHTML="";
}

/* TAB 2 - YAZIM DÜZENLEYİCİ */
function fixText(){

    let text = document.getElementById("input2").value;

    text = text
        .replace(/&nbsp;/gi," ")
        .replace(/nbsp;/gi," ")
        .replace(/;nbsp/gi," ")
        .replace(/\u00A0/g," ")
        .replace(/[ \t]+/g," ");

    let lines = text.split("\n");

    lines = lines.map(line=>{

        line = line.trim();

        if(!line) return "";

        line = line.toLowerCase();
        line = line.charAt(0).toUpperCase() + line.slice(1);

        return highlight(line);
    });

    lines = lines.filter(line => line !== "");

    document.getElementById("output2").innerHTML = lines.join("<br>");
}

function copy2(){
    navigator.clipboard.writeText(
        document.getElementById("output2").innerText
    );
}

function clear2(){
    document.getElementById("input2").value="";
    document.getElementById("output2").innerHTML="";
}

</script>

</body>
</html>
