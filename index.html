<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri Panel</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    background:#050b17;
    color:white;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

.tab-btn{
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px 16px;
    border-radius:6px;
    cursor:pointer;
}

.tab-btn.active{
    border-color:#ffb300;
    transform:scale(1.05);
}

.container{
    position:relative;
    width:100%;
}

.tab-content{
    position:absolute;
    width:100%;
    opacity:0;
    transform:translateX(30px);
    transition:.4s;
    pointer-events:none;
}

.tab-content.active{
    opacity:1;
    transform:translateX(0);
    position:relative;
    pointer-events:auto;
}

textarea{
    width:100%;
    height:180px;
    background:#0d1628;
    color:white;
    border:1px solid #23324d;
    padding:12px;
}

.output{
    width:100%;
    min-height:180px;
    background:#0d1628;
    border:1px solid #23324d;
    padding:12px;
    white-space:pre-wrap;
}

button{
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px 14px;
    margin-right:10px;
    border-radius:6px;
    cursor:pointer;
}

.bad-word{
    color:#ff2b2b;
    font-weight:800;
    background:rgba(255,0,0,0.12);
    padding:2px 4px;
    border-radius:4px;
}

/* 🌈 EFSANE TENGRİ LOGO */
.watermark{
    position:fixed;
    bottom:20px;
    left:0;
    width:100%;
    text-align:center;

    font-size:64px;
    font-weight:900;
    letter-spacing:12px;

    user-select:none;
    pointer-events:none;

    background: linear-gradient(
        90deg,
        #ffb300,
        #ff2d55,
        #00e5ff,
        #7c4dff,
        #ffb300
    );

    background-size:300% 100%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation: glow 3s linear infinite,
               pulse 2s ease-in-out infinite,
               float 4s ease-in-out infinite;

    text-shadow:
        0 0 10px rgba(255,179,0,0.4),
        0 0 20px rgba(255,45,85,0.3),
        0 0 40px rgba(124,77,255,0.2);
}

@keyframes glow{
    0%{background-position:0%;}
    100%{background-position:300%;}
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
}

@keyframes float{
    0%,100%{transform:translateY(0px);}
    50%{transform:translateY(-8px);}
}
</style>
</head>

<body>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Boşluk Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım Düzenleyici</button>
</div>

<div class="container">

<div class="tab-content active">
<h3>Metni buraya yapıştır</h3>
<textarea id="input1"></textarea>
<button onclick="cleanSpaces()">Temizle</button>
<button onclick="copy1()">Kopyala</button>
<button onclick="clear1()">Sil</button>
<div id="output1" class="output"></div>
</div>

<div class="tab-content">
<h3>Metni buraya yapıştır</h3>
<textarea id="input2"></textarea>
<button onclick="fixText()">Düzelt</button>
<button onclick="copy2()">Kopyala</button>
<button onclick="clear2()">Sil</button>
<div id="output2" class="output"></div>
</div>

</div>

<div class="watermark">TENGRİ</div>

<script>

/* TAB */
function openTab(i){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));

    document.querySelectorAll(".tab-content")[i].classList.add("active");
    document.querySelectorAll(".tab-btn")[i].classList.add("active");
}

/* YASAKLI KELİMELER */
const bannedWords = [
    "yüksek kalite",
    "yüksek kaliteli",
    "hakiki deri",
    "gerçek deri",
    "%100 deri",
    "unisex"
];

function highlight(text){
    bannedWords.forEach(word=>{
        text = text.replace(new RegExp(word,"gi"),
            m=>`<span class="bad-word">${m}</span>`);
    });
    return text;
}

/* TAB 1 */
function cleanSpaces(){
    let t = input1.value;

    t = t
        .replace(/\u00A0/g," ")
        .split("\n")
        .map(l=>l.replace(/\s+/g," ").trim())
        .filter(l=>l)
        .join("\n");

    output1.innerHTML = highlight(t);
}

/* TAB 2 */
function fixText(){
    let t = input2.value;

    t = t
        .replace(/\u00A0/g," ")
        .replace(/\s+/g," ");

    t = t.toLowerCase();
    t = t.charAt(0).toUpperCase() + t.slice(1);

    output2.innerHTML = highlight(t);
}

/* COPY / CLEAR */
function copy1(){navigator.clipboard.writeText(output1.innerText);}
function copy2(){navigator.clipboard.writeText(output2.innerText);}
function clear1(){input1.value="";output1.innerHTML="";}
function clear2(){input2.value="";output2.innerHTML="";}

</script>

</body>
</html>
