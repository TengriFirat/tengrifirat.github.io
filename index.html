<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri Panel</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    background: radial-gradient(circle at center, #0a152d 0%, #030710 100%);
    color:#e2e8f0;
    font-family:'Segoe UI', Arial, sans-serif;
    overflow-x:hidden;
    min-height: 100vh;
}

/* TABS CONTAINER */
.tabs{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:30px;
}

/* EPİK BUTON STİLLERİ (Genel ve Tab Butonları) */
button, .tab-btn {
    background: linear-gradient(135deg, #0d1628 0%, #050b17 100%);
    color: #ffb300;
    border: 2px solid #ffb300;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(255, 179, 0, 0.15);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
}

button:hover, .tab-btn:hover {
    color: #ffffff;
    background: linear-gradient(135deg, #ffb300 0%, #ff5500 100%);
    box-shadow: 0 0 20px rgba(255, 85, 0, 0.4);
    transform: translateY(-2px);
}

button:active, .tab-btn:active {
    transform: translateY(1px);
}

/* AKTİF TAB BUTONU */
.tab-btn.active {
    background: linear-gradient(135deg, #ffb300 0%, #ff5500 100%);
    color: #fff;
    border-color: #fff;
    box-shadow: 0 0 25px rgba(255, 179, 0, 0.6);
    transform: scale(1.05);
}

/* İÇERİK ALANI */
.container{
    position:relative;
    width:100%;
    max-width: 1000px;
    margin: 0 auto;
}

.tab-content{
    position:absolute;
    width:100%;
    opacity:0;
    transform:translateY(20px);
    transition: all .4s ease-in-out;
    pointer-events:none;
    background: rgba(13, 22, 40, 0.6);
    padding: 25px;
    border-radius: 12px;
    border: 1px solid #1e2d4a;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.tab-content.active{
    opacity:1;
    transform:translateY(0);
    position:relative;
    pointer-events:auto;
}

h3 {
    color: #fff;
    font-size: 18px;
    margin-top: 0;
    margin-bottom: 15px;
    letter-spacing: 0.5px;
    border-left: 4px solid #ff5500;
    padding-left: 10px;
}

/* TEXTAREA VE METİN ALANLARI */
textarea, .output{
    width:100%;
    height:200px;
    background:#070d19;
    color:#f1f5f9;
    border: 2px solid #1e2d4a;
    padding:14px;
    font-size: 15px;
    line-height: 1.6;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    margin-bottom: 15px;
}

textarea:focus, .output:focus {
    border-color: #ffb300;
    box-shadow: 0 0 15px rgba(255, 179, 0, 0.2);
}

.output{
    min-height:200px;
    height: auto;
    white-space:pre-wrap;
    background: #050b17;
    border-style: dashed; /* Çıktı alanını ayırmak için kesikli hat */
}

/* AKSİYON BUTONLARI ARASI BOŞLUK */
.action-buttons {
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

/* YASAKLI KELİME RADYASYON EFEKTİ */
.bad-word{
    color:#ff3333;
    font-weight:800;
    background:rgba(255, 51, 51, 0.15);
    border: 1px solid rgba(255, 51, 51, 0.3);
    padding:2px 6px;
    border-radius:4px;
    text-shadow: 0 0 5px rgba(255, 51, 51, 0.5);
}

/* WATERMARK */
.watermark{
    position:fixed;
    bottom:25px;
    left:0;
    width:100%;
    text-align:center;
    font-size:52px;
    font-weight:900;
    letter-spacing:15px;
    pointer-events:none;
    user-select:none;
    opacity: 0.15; /* Arkada asil durması için opaklık düşürüldü */

    background:linear-gradient(90deg,#ffb300,#ff5500,#fff,#ff5500,#ffb300);
    background-size:300% 100%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation: glow 4s linear infinite, pulse 3s ease-in-out infinite;
}

@keyframes glow{
    0%{background-position:0%;}
    100%{background-position:300%;}
}

@keyframes pulse{
    0%,100%{transform:scale(1); opacity: 0.12;}
    50%{transform:scale(1.03); opacity: 0.22;}
}
</style>
</head>

<body>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Boşluk Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım Düzenleyici</button>
</div>

<div class="container">

    <div class="tab-content active">
        <h3>Metni buraya yapıştır aslan parçası</h3>
        <textarea id="input1"></textarea>
        <div class="action-buttons">
            <button onclick="cleanSpaces()">Temizle</button>
            <button onclick="copy1()">Kopyala</button>
            <button onclick="clear1()">Sil</button>
        </div>
        <div id="output1" class="output" contenteditable="true"></div>
    </div>

    <div class="tab-content">
        <h3>Metni buraya yapıştır aslan parçası</h3>
        <textarea id="input2"></textarea>
        <div class="action-buttons">
            <button onclick="fixText()">Düzelt</button>
            <button onclick="copy2()">Kopyala</button>
            <button onclick="clear2()">Sil</button>
        </div>
        <div id="output2" class="output" contenteditable="true"></div>
    </div>

</div>

<div class="watermark">⚔️ TENGRİ ⚔️</div>

<script>

/* TAB GEÇİŞLERİ */
function openTab(i){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));

    document.querySelectorAll(".tab-content")[i].classList.add("active");
    document.querySelectorAll(".tab-btn")[i].classList.add("active");
}

/* YASAKLI KELİMELER */
const bannedWords = [
    "yüksek kalite",
    "yüksek kaliteli",
    "hakiki deri",
    "gerçek deri",
    "%100 deri",
    "% 100 deri",
    "birinci sınıf",
    "1. kalite",
    "1. sınıf",
    "unisex",
    "1.sınıf",
    "1.kalite",
    "1.kalıte",
    "1. kalıte",
    "1.SINIF",
    "1. SINIF",
    "1.KALİTE",
    "1. KALİTE",
    "BİRİNCİ SINIF",
    "YÜKSEK KALİTE",
    "YÜKSEK KALITE"
];

function escapeRegExp(str){
    return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}

function highlight(text){
    bannedWords.forEach(word=>{
        const pattern = escapeRegExp(word).replace(/\s+/g,"\\s+");
        const reg = new RegExp(pattern,"gi");

        text = text.replace(reg, m=>{
            return `<span class="bad-word">${m}</span>`;
        });
    });

    return text;
}

/* TAB 1 FONKSİYONLARI */
function cleanSpaces(){
    let t = document.getElementById("input1").value;

    t = t
        .replace(/&nbsp;/gi," ")
        .replace(/nbsp;/gi," ")
        .replace(/;nbsp/gi," ")
        .replace(/\u00A0/g," ");

    t = t
        .split("\n")
        .map(line => line.replace(/[ \t]+/g," ").trim())
        .filter(line => line.length > 0)
        .join("\n");

    document.getElementById("output1").innerHTML = highlight(t);
}

function copy1(){
    navigator.clipboard.writeText(
        document.getElementById("output1").innerText
    );
}

function clear1(){
    document.getElementById("input1").value="";
    document.getElementById("output1").innerHTML="";
}

/* TAB 2 FONKSİYONLARI */
function fixText(){
    let text = document.getElementById("input2").value;

    text = text
        .replace(/&nbsp;/gi," ")
        .replace(/nbsp;/gi," ")
        .replace(/;nbsp/gi," ")
        .replace(/\u00A0/g," ")
        .replace(/[ \t]+/g," ")
        .trim()
        .toLowerCase();

    /* Nokta/ünlem/soru sonrası büyük harf */
    text = text.replace(/(^|[.!?]\s+)([a-zçğıöşü])/g, (match, p1, p2) => {
        return p1 + p2.toUpperCase();
    });

    let lines = text.split("\n");

    lines = lines.map(line=>{
        line = line.trim();
        if(!line) return "";
        return highlight(line);
    });

    lines = lines.filter(line => line !== "");

    document.getElementById("output2").innerHTML = lines.join("<br>");
}

function copy2(){
    navigator.clipboard.writeText(
        document.getElementById("output2").innerText
    );
}

function clear2(){
    document.getElementById("input2").value="";
    document.getElementById("output2").innerHTML="";
}

</script>

</body>
</html>
