<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hepsiburada Ürün Açıklaması Düzenleyici</title>

<style>
/* ==========================================================================
   EPIC PREMIUM COLOR THEMES (MAT, AĞIRBAŞLI VE LÜKS)
   ========================================================================== */

/* 1. DEFAULT: MIDNIGHT OLED (ZİFİRİ MAT DERİN SİYAH) */
:root {
    --bg-main: #000000;
    --bg-container: #09090a;
    --bg-input: #020203;
    --bg-btn: #121214;
    --bg-btn-hover: #1a1a1e;
    --bg-tab-active: #1a1a1e;
    --text-main: #8e8e93;
    --text-input: #f2f2f7;
    --text-heading: #ffffff;
    --text-btn: #aeaeb2;
    --border-color: #242426;
    --border-container: #1c1c1e;
    --accent-color: #f2f2f7; 
    --accent-glow: rgba(255, 255, 255, 0.15);
}

/* TEMA RENKLERİ GERİ KALANLAR */
html[data-theme="crimson"] {
    --bg-main: #0c0808; --bg-container: #161010; --bg-input: #080505; --bg-btn: #241818; --bg-btn-hover: #332222; --bg-tab-active: #332222; --text-main: #b8a0a0; --text-input: #f5eded; --text-heading: #ffffff; --text-btn: #e63946; --border-color: #402b2b; --border-container: #2e1f1f; --accent-color: #d62828; --accent-glow: rgba(214, 40, 40, 0.4);
}
html[data-theme="blue"] {
    --bg-main: #080c14; --bg-container: #101624; --bg-input: #05080d; --bg-btn: #182238; --bg-btn-hover: #22304f; --bg-tab-active: #22304f; --text-main: #a0b0c8; --text-input: #edf3f8; --text-heading: #ffffff; --text-btn: #4ea8de; --border-color: #2b3d61; --border-container: #1f2c47; --accent-color: #0077b6; --accent-glow: rgba(0, 119, 182, 0.4);
}
html[data-theme="green"] {
    --bg-main: #060c08; --bg-container: #0d1a12; --bg-input: #040906; --bg-btn: #162e20; --bg-btn-hover: #1f422e; --bg-tab-active: #1f422e; --text-main: #9ebda8; --text-input: #ecf5ef; --text-heading: #ffffff; --text-btn: #52b788; --border-color: #275239; --border-container: #1c3b29; --accent-color: #2d6a4f; --accent-glow: rgba(45, 106, 79, 0.4);
}
html[data-theme="purple"] {
    --bg-main: #0a0712; --bg-container: #151024; --bg-input: #06040d; --bg-btn: #211938; --bg-btn-hover: #2f244f; --bg-tab-active: #2f244f; --text-main: #a8a0c8; --text-input: #f0edf8; --text-heading: #ffffff; --text-btn: #b5179e; --border-color: #3b2d61; --border-container: #2a2047; --accent-color: #7209b7; --accent-glow: rgba(114, 9, 183, 0.4);
}
html[data-theme="pink"] {
    --bg-main: #0f070b; --bg-container: #1f1019; --bg-input: #0a0408; --bg-btn: #331a29; --bg-btn-hover: #472439; --bg-tab-active: #472439; --text-main: #cda2bd; --text-input: #faf0f6; --text-heading: #ffffff; --text-btn: #ff758f; --border-color: #592d47; --border-container: #422135; --accent-color: #ff4d6d; --accent-glow: rgba(255, 77, 109, 0.4);
}
html[data-theme="yellow"] {
    --bg-main: #0d0c04; --bg-container: #1c1a09; --bg-input: #090802; --bg-btn: #2e2a10; --bg-btn-hover: #403b16; --bg-tab-active: #403b16; --text-main: #cfcb9e; --text-input: #fbfbfa; --text-heading: #ffffff; --text-btn: #ffd166; --border-color: #524b1c; --border-container: #3d3815; --accent-color: #ffb703; --accent-glow: rgba(255, 183, 3, 0.4);
}
html[data-theme="orange"] {
    --bg-main: #0d0a06; --bg-container: #1c150d; --bg-input: #080604; --bg-btn: #2b2114; --bg-btn-hover: #372d1d; --bg-tab-active: #372d1d; --text-main: #c2b29e; --text-input: #f7f3ed; --text-heading: #ffffff; --text-btn: #f3a712; --border-color: #4f3d26; --border-container: #3b2e1c; --accent-color: #e67e22; --accent-glow: rgba(230, 126, 34, 0.4);
}
html[data-theme="slate"] {
    --bg-main: #121315; --bg-container: #1e2024; --bg-input: #0b0c0d; --bg-btn: #2d3138; --bg-btn-hover: #3f444f; --bg-tab-active: #3f444f; --text-main: #949a8c; --text-input: #f1f2f4; --text-heading: #ffffff; --text-btn: #90e0ef; --border-color: #474d59; --border-container: #333840; --accent-color: #00b4d8; --accent-glow: rgba(0, 180, 216, 0.3);
}
html[data-theme="white"] {
    --bg-main: #f1f3f6; --bg-container: #ffffff; --bg-input: #f8fafc; --bg-btn: #e4e9f0; --bg-btn-hover: #d1d9e6; --bg-tab-active: #ffffff; --text-main: #4a5568; --text-input: #1a202c; --text-heading: #1a202c; --text-btn: #4a5568; --border-color: #cbd5e1; --border-container: #e2e8f0; --accent-color: #2d3748; --accent-glow: rgba(45, 55, 72, 0.1);
}

*{box-sizing:border-box;}
html, body, .input-area, div { cursor: default; }
button, .tab-btn, .theme-dot, .oracle-sphere { cursor: pointer; }

body {
    margin:0;
    padding:20px 20px 140px 20px; 
    background: var(--bg-main) !important; 
    color: var(--text-main) !important;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    overflow-x:hidden;
    min-height: 100vh;
    transition: background 0.25s ease, color 0.25s ease;
}

/* Kahve Molası Modu Aktifken Tüm Sayfayı Flu Yapma */
body.coffee-blur-active > *:not(#coffee-modal) {
    filter: blur(12px) grayscale(40%);
    pointer-events: none;
    transition: filter 0.6s cubic-bezier(0.25, 1, 0.5, 1);
}

.theme-selector { display: flex; justify-content: flex-end; gap: 12px; max-width: 900px; margin: 0 auto 20px auto; align-items: center; background: var(--bg-container); padding: 12px 18px; border-radius: 8px; border: 1px solid var(--border-container); }
.theme-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; color: var(--text-main); opacity: 0.8; }
.theme-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
.theme-dot:hover { transform: scale(1.2); }
.theme-dot.active { border-color: var(--text-heading) !important; transform: scale(1.1); box-shadow: 0 0 12px var(--accent-color); }

.oracle-box { max-width: 900px; margin: 0 auto 25px auto; background: var(--bg-container); border: 1px solid var(--border-container); border-radius: 10px; padding: 20px; display: flex; align-items: center; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; overflow: hidden; }
.oracle-sphere-wrapper { position: relative; flex-shrink: 0; }
.oracle-sphere { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, var(--text-heading), var(--accent-color)); box-shadow: 0 0 20px var(--accent-glow), inset -5px -5px 15px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 24px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); user-select: none; }
.oracle-sphere:hover { transform: scale(1.1) rotate(15deg); box-shadow: 0 0 30px var(--accent-color), inset -2px -2px 10px rgba(0,0,0,0.4); }
.oracle-sphere:active { transform: scale(0.95); }
.oracle-text-area { flex-grow: 1; }
.oracle-title { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-color); font-weight: 700; margin-bottom: 4px; }
.oracle-quote { font-size: 14px; color: var(--text-input); font-style: italic; line-height: 1.5; transition: opacity 0.2s ease; }
.pulse-glow { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: var(--accent-color); opacity: 0.15; animation: spherePulse 2s infinite ease-in-out; top: 0; left: 0; pointer-events: none; }
@keyframes spherePulse { 0% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.3); opacity: 0; } 100% { transform: scale(1); opacity: 0.2; } }
.glitch-effect { animation: textGlitch 0.2s linear 2; }
@keyframes textGlitch { 0% { transform: translate(2px, 1px); opacity: 0.7; } 50% { transform: translate(-1px, -1px); opacity: 0.9; } 100% { transform: translate(0, 0); opacity: 1; } }

.tabs{ display:flex; justify-content:center; gap:12px; margin-bottom:25px; }
button, .tab-btn { background: var(--bg-btn); color: var(--text-btn); border: 1px solid var(--border-color); padding: 12px 26px; font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; border-radius: 6px; transition: all 0.2s ease; position: relative; }
button:hover, .tab-btn:hover { color: var(--text-heading) !important; background: var(--bg-btn-hover); border-color: var(--accent-color); box-shadow: 0 0 12px var(--accent-glow); }
.tab-btn.active { background: var(--bg-tab-active) !important; color: var(--text-heading) !important; border-color: var(--accent-color) !important; box-shadow: 0 0 15px var(--accent-glow); }

.container{ position:relative; width:100%; max-width: 900px; margin: 0 auto; }
.tab-content{ position:absolute; width:100%; opacity:0; transform:scale(0.99); transition: all .25s ease-in-out; pointer-events:none; background: var(--bg-container); padding: 28px; border-radius: 10px; border: 1px solid var(--border-container); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
.tab-content.active{ opacity:1; transform:scale(1); position:relative; pointer-events:auto; }

h3 { color: var(--text-heading); font-size: 14px; margin-top: 0; margin-bottom: 22px; letter-spacing: 1px; text-transform: uppercase; border-left: 3px solid var(--accent-color); padding-left: 12px; font-weight: 600; }
.input-area, .output{ width:100%; height:220px; background: var(--bg-input); color: var(--text-input); border: 1px solid var(--border-color); padding:16px; font-size: 14px; line-height: 1.6; border-radius: 6px; outline: none; transition: all 0.2s ease; margin-bottom: 6px; overflow-y: auto; word-break: break-word; font-family: inherit; }
.input-area:focus, .output:focus { border-color: var(--accent-color); box-shadow: 0 0 10px var(--accent-glow); }
.output{ min-height:220px; height: auto; border-style: dashed; }
.meta-info { font-size: 11px; color: var(--text-main); margin-bottom: 18px; display: flex; gap: 18px; opacity: 0.7; letter-spacing: 0.5px; }
.meta-info span strong { color: var(--text-heading); }
.action-buttons { margin-bottom: 25px; display: flex; gap: 12px; flex-wrap: wrap; }
.bad-word{ color:#ff3366; font-weight:600; background:rgba(255, 51, 102, 0.08); border: 1px solid rgba(255, 51, 102, 0.3); padding:2px 6px; border-radius:4px; }
.toast { position: fixed; top: -100px; right: 25px; background: var(--bg-container); border: 1px solid var(--accent-color); color: var(--text-heading); padding: 14px 28px; border-radius: 6px; font-size: 12px; font-weight: 600; letter-spacing: 1px; box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px var(--accent-glow); transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10000; }
.toast.show { top: 25px; }
.watermark{ position:fixed; bottom:160px; left:0; width:100%; text-align:center; font-size:70px; font-weight:900; letter-spacing:25px; pointer-events:none; user-select:none; opacity: 0.015; color: var(--text-heading); animation: pulse 5s ease-in-out infinite; }
@keyframes pulse{ 0%,100%{transform:scale(1); opacity: 0.012;} 50%{transform:scale(1.01); opacity: 0.02;} }

/* ==========================================================================
   🎵 MÜZİK ÇALAR - YENİ SES AYARLI VE SİBER CYBER TASARIM
   ========================================================================== */
.cyber-player {
    position: fixed;
    bottom: 0; left: 0; width: 100%;
    background: var(--bg-container);
    border-top: 1px solid var(--border-container);
    padding: 10px 30px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.6);
    z-index: 9999;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
}
.cyber-player.minimized { transform: translateY(100%); }
.player-toggle-btn {
    position: absolute; right: 30px; top: -24px;
    background: var(--bg-container); border: 1px solid var(--border-container); border-bottom: none;
    padding: 4px 14px; font-size: 10px; font-weight: bold; letter-spacing: 1px;
    border-radius: 6px 6px 0 0; color: var(--text-main); transition: all 0.2s;
}
.player-toggle-btn:hover { color: var(--text-heading); background: var(--bg-btn-hover); }
.player-top-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
.player-info { display: flex; align-items: center; gap: 12px; width: 30%; }
.player-icon { font-size: 18px; animation: rotateDisc 4s linear infinite; animation-play-state: paused; }
.cyber-player.playing .player-icon { animation-play-state: running; }
@keyframes rotateDisc { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.track-details { display: flex; flex-direction: column; }
.track-name { color: var(--text-heading); font-size: 12px; font-weight: 600; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
.track-index { color: var(--text-main); font-size: 10px; opacity: 0.5; margin-top: 1px; }
.player-controls { display: flex; align-items: center; gap: 6px; }
.player-btn { padding: 6px 12px; font-size: 10px; letter-spacing: 0.5px; background: var(--bg-btn); border: 1px solid var(--border-color); text-transform: uppercase; }
.player-btn.active-mode { border-color: var(--accent-color); color: var(--text-heading); box-shadow: 0 0 8px var(--accent-glow); }

/* Premium Ses Kısmı/Açma Kaydırıcı Mekanizması */
.volume-control { display: flex; align-items: center; gap: 8px; margin-left: 15px; }
.volume-icon { font-size: 14px; color: var(--text-main); cursor: pointer; user-select: none; }
.volume-slider { -webkit-appearance: none; appearance: none; width: 70px; height: 4px; background: var(--bg-input); border-radius: 2px; outline: none; cursor: pointer; }
.volume-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 10px; height: 10px; border-radius: 50%; background: var(--accent-color); box-shadow: 0 0 6px var(--accent-color); }
.volume-slider::-moz-range-thumb { width: 10px; height: 10px; border-radius: 50%; background: var(--accent-color); box-shadow: 0 0 6px var(--accent-color); border: none; }

.player-timeline-wrapper { display: flex; align-items: center; gap: 10px; width: 100%; }
.time-display { font-size: 11px; font-family: monospace; color: var(--text-main); min-width: 35px; opacity: 0.8; }
.timeline-container { flex-grow: 1; height: 4px; background: var(--bg-input); border-radius: 2px; position: relative; cursor: pointer; }
.timeline-progress { height: 100%; width: 0%; background: var(--accent-color); box-shadow: 0 0 6px var(--accent-color); border-radius: 2px; pointer-events: none; }

/* ==========================================================================
   ☕ KAHVE MOLASI - DAHA ŞEFFAF VE GÜZEL DUMANLI TASARIM
   ========================================================================== */
.coffee-modal {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(4, 4, 5, 0.65); /* Çok daha şeffaf bir arka plan */
    z-index: 100000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    backdrop-filter: blur(4px); /* Arka planı hafif yumuşatan estetik dokunuş */
}
.coffee-modal.show { opacity: 1; pointer-events: auto; }

/* SVG Çizim Kupası ve Yoğun Harika Duman Efekti */
.coffee-draw-wrapper {
    position: relative;
    width: 120px;
    height: 120px;
    margin-bottom: 40px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
}
.coffee-svg {
    width: 90px;
    height: 90px;
    stroke: rgba(255, 255, 255, 0.45); /* Şeffaf tasarıma uygun zarif kupa çizgileri */
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.2));
}
.vector-smoke {
    position: absolute;
    top: -20px;
    display: flex;
    gap: 16px;
}
.vector-smoke span {
    display: block;
    width: 4px;
    height: 45px;
    background: linear-gradient(to top, rgba(255,255,255,0.6), rgba(255,255,255,0.1), transparent);
    border-radius: 8px;
    filter: blur(3px); /* Gerçekçi, güzel duman hissiyatı */
    animation: luxurySmoke 3s infinite ease-in-out;
    opacity: 0;
}
.vector-smoke span:nth-child(1) { animation-delay: 0.1s; animation-duration: 2.8s; }
.vector-smoke span:nth-child(2) { animation-delay: 0.9s; animation-duration: 3.4s; height: 55px; }
.vector-smoke span:nth-child(3) { animation-delay: 0.5s; animation-duration: 3s; }

@keyframes luxurySmoke {
    0% { transform: translateY(20px) scaleX(0.8) skewX(0deg); opacity: 0; }
    30% { opacity: 0.7; }
    60% { transform: translateY(-10px) scaleX(1.4) skewX(12deg); opacity: 0.4; }
    100% { transform: translateY(-45px) scaleX(2) skewX(-15deg); opacity: 0; }
}

/* Saydam, Huzur Veren Geçişli Yazı Alanı */
.coffee-quote-display {
    max-width: 650px;
    text-align: center;
    font-size: 17px;
    font-weight: 300;
    line-height: 1.7;
    color: rgba(255, 255, 255, 0.7); 
    letter-spacing: 0.8px;
    padding: 0 30px;
    min-height: 80px;
    transition: opacity 1.2s ease-in-out, transform 1.2s ease-in-out;
}
.coffee-quote-display.fade {
    opacity: 0;
    transform: translateY(3px);
}
.coffee-close-btn {
    margin-top: 50px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.6);
    padding: 10px 24px; font-size: 11px; letter-spacing: 2px; border-radius: 4px;
    transition: all 0.3s;
}
.coffee-close-btn:hover {
    border-color: #ffffff;
    color: #ffffff;
    background: rgba(255,255,255,0.05);
}

/* ==========================================================================
   🔥 TENGRİ KAOS EKRAN ORTASI TEK GÖRSEL MODU
   ========================================================================== */
.tengri-center-img {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 450px;
    max-width: 90vw;
    height: auto;
    z-index: 100005;
    border: 3px solid rgba(255,255,255,0.4);
    box-shadow: 0 0 50px rgba(0,0,0,0.9), 0 0 30px var(--accent-glow);
    display: none;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="theme-selector">
    <span class="theme-label">TEMA:</span>
    <div class="theme-dot id-dark-dot active" style="background: #1c1c1e; border: 1px solid #3a3a3c;" onclick="changeTheme('dark', this)" title="Midnight OLED"></div>
    <div class="theme-dot" style="background: #d62828;" onclick="changeTheme('crimson', this)" title="Cyber Crimson"></div>
    <div class="theme-dot" style="background: #0077b6;" onclick="changeTheme('blue', this)" title="Deep Sapphire"></div>
    <div class="theme-dot" style="background: #2d6a4f;" onclick="changeTheme('green', this)" title="Emerald Velvet"></div>
    <div class="theme-dot" style="background: #7209b7;" onclick="changeTheme('purple', this)" title="Amethyst Dusk"></div>
    <div class="theme-dot" style="background: #ff4d6d;" onclick="changeTheme('pink', this)" title="Rose Quartz"></div>
    <div class="theme-dot" style="background: #ffb703;" onclick="changeTheme('yellow', this)" title="Muted Gold"></div>
    <div class="theme-dot" style="background: #e67e22;" onclick="changeTheme('orange', this)" title="Imperial Amber"></div>
    <div class="theme-dot" style="background: #474d59;" onclick="changeTheme('slate', this)" title="Titanium Slate"></div>
    <div class="theme-dot" style="background: #ffffff; border: 1px solid #cbd5e1;" onclick="changeTheme('white', this)" title="Obsidian White"></div>
    
    <button onclick="startCoffeeBreak()" style="padding: 6px 14px; font-size: 11px; margin-left: 10px; background: #1c1a09; border-color: #ffd166; color: #ffd166;">☕ KAHVE MOLASI</button>
</div>

<div class="oracle-box">
    <div class="oracle-sphere-wrapper">
        <div class="pulse-glow"></div>
        <div class="oracle-sphere" onclick="getTengriOracle()">🔮</div>
    </div>
    <div class="oracle-text-area">
        <div class="oracle-title">⚡ ORACLE / GÜNÜN SİBER KEHANETİ</div>
        <div id="oracle-display" class="oracle-quote">Küreye tıkla ve siber kaderinle yüzleş...</div>
    </div>
</div>

<div id="toast-notification" class="toast">⚡ METİN BAŞARIYLA KOPYALANDI!</div>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Boşluk Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım Düzenleyici</button>
</div>

<div class="container">
    <div class="tab-content active">
        <h3>Metni buraya yapıştır aslan parçası</h3>
        <div id="input1" class="input-area" contenteditable="true" oninput="calculateMeta(1)"></div>
        <div class="meta-info">
            <span id="char-count-1">Karakter: <strong>0</strong></span>
            <span id="word-count-1">Kelime: <strong>0</strong></span>
        </div>
        <div class="action-buttons">
            <button onclick="cleanSpaces()">Temizle</button>
            <button onclick="copy1()">Kopyala</button>
            <button onclick="clear1()">Sil</button>
        </div>
        <div id="output1" class="output" contenteditable="true"></div>
    </div>

<script>
// Oracle sözleri listesi

    "Tengri Oracle görevini tamamladı. Şimdi o 'Kopyala' butonuna bas ve şovunu yap aslan parçası!"

// İstediğin 30 Tane Kusursuz Motive Edici Sözler (Huzurlu ve Seffaf Yapıya Uygun)
const coffeeQuotes = [
    "Derin bir nefes al. Şu an her şey kontrolün altında olmasa bile, bu senin değerini eksiltmez.",

    "Bugün gösterdiğin sabır, yarın kuracağın o özgür dünyanın en sağlam temel taşı olacak.",
    "Kendine haksızlık etmeyi bırak. Bugün elinden gelenin en iyisini yapıyorsun ve bu tamamen yeterli.",
    "Yavaşla. Dünya seni bekleyebilir. Bu kahvenin tadı, önündeki tüm işlerden daha önemli.",
    "Unutma: En karmaşık kodlar bile tek bir düzeltmeyle çözülür. Hayatındaki karmaşa da öyle.",
    "Sen bir iş unvanından, bir excel tablosundan ya da revizyon raporundan çok daha fazlasısın.",
    "Zor zamanlar güçlü insanlar yaratır. Şu an vizyonunu genişleten harika bir olgunlaşma dönemindesin.",
    "Bugünün stresi yarının tecrübesidir. Sakince kahveni yudumla ve zihnini serbest bırak.",

    "Zihnindeki gürültüyü kapat. Sadece kahvenin kokusuna aura ritmine odaklan.",

    "Fırtınalar ağaçların köklerini derinleştirir. Yaşadığın kurumsal krizler de senin profesyonelliğini.",
    "Biraz durup dinlenmek, pes etmek demek değildir. Daha güçlü koşmak için stratejik bir geri çekilmedir.",
    "Cüzdanındaki sayılar ya da ekrandaki dökümanlar seni tanımlamaz. Sen eşsiz bir dehasın.",
    "Zorlu bir sabahı geride bıraktın, harika bir öğleden sonrasına hazırsın. Kahven sana güç versin.",
    "Her şey bittiğinde arkana yaslanıp bu günleri tatlı bir tebessümle hatırlayacaksın. İnan bana.",
    "Zihnini temizle, gereksiz beklentileri tıpkı metindeki çift boşluklar gibi hayatından ayıkla.",
    "Bugün kendin için küçük bir iyilik yap ve sadece bu ana odaklan. Huzur tam olarak burada saklı.",
    "Başkalarının ne düşündüğü onların sınırıdır, senin potansiyelinin sınırı ise gökyüzüdür.",
    "Sakin ol. Hayat bir yarış değil. Kendi ritminde, pürüzsüz ve asil bir şekilde ilerliyorsun.",
    "Bulutlar dağılır, güneş elbet doğar. Siber evrenin bu geçici yoğunluğu seni asla yıldırmasın.",
    "Gök tengri senin emeğini, döktüğün her damla alın terini görüyor. Mükafatın çok yakındır, sabret."
];

function getTengriOracle() { const display = document.getElementById("oracle-display"); display.classList.add("glitch-effect"); display.style.opacity = 0.3; setTimeout(() => { const randomIndex = Math.floor(Math.random() * oracleQuotes.length); display.innerText = oracleQuotes[randomIndex]; display.style.opacity = 1; setTimeout(() => { display.classList.remove("glitch-effect"); }, 200); }, 200); }
function changeTheme(themeName, element) { if(themeName === 'dark') { document.documentElement.removeAttribute('data-theme'); } else { document.documentElement.setAttribute('data-theme', themeName); } document.querySelectorAll('.theme-dot').forEach(dot => dot.classList.remove('active')); element.classList.add('active'); }
function showToast() { const toast = document.getElementById("toast-notification"); toast.classList.add("show"); setTimeout(() => { toast.classList.remove("show"); }, 2000); }

// Çıldırtma Mekanizması Kontrolü
function calculateMeta(tabIndex) { 
    const inputArea = document.getElementById(`input${tabIndex}`);
    const text = inputArea.innerText; 
    const charCount = text.length; 
    const wordCount = text.trim() === "" ? 0 : text.trim().split(/\s+/).length; 
    document.getElementById(`char-count-${tabIndex}`).innerHTML = `Karakter: <strong>${charCount}</strong>`; 
    document.getElementById(`word-count-${tabIndex}`).innerHTML = `Kelime: <strong>${wordCount}</strong>`; 

    if (text.trim().toLowerCase() === "tengri") {
        startTengriChaosEngine();
    } else {
        // "tengri" yazısı silindiği an hemen kaos motorunu durdur
        if (isChaosActive && document.getElementById("input1").innerText.trim().toLowerCase() !== "tengri" && document.getElementById("input2").innerText.trim().toLowerCase() !== "tengri") {
            stopTengriChaosEngine();
        }
    }
}

function openTab(i){ document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active")); document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active")); document.querySelectorAll(".tab-content")[i].classList.add("active"); document.querySelectorAll(".tab-btn")[i].classList.add("active"); }
const bannedWords = ["yüksek kalite", "yüksek kaliteli", "hakiki deri", "gerçek deri", "%100 deri", "% 100 deri", "birinci sınıf", "1. kalite", "1. sınıf"];
function escapeRegExp(str){ return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function highlight(text) { bannedWords.forEach(word => { const pattern = escapeRegExp(word).replace(/\s+/g,"\\s+"); const reg = new RegExp(pattern,"gi"); text = text.replace(reg, m => `<span class="bad-word">${m}</span>`); }); return text; }
function hardProtectBoldStyles(rawHtml) { if (!rawHtml) return ""; let protectedHtml = rawHtml.replace(/<span[^>]*style="[^"]*font-weight:\s*bold;?[^"]*"[^>]*>([\s\S]*?)<\/span>/gi, '<b>$1</b>'); return protectedHtml; }

function cleanInvisibleWebGarbage(txt, forceLowercase = false) {
    if (!txt) return "";
    let clean = txt.replace(/[\r\u200B\u200C\u200D\uFEFF]/g, "").replace(/&nbsp;/gi, " ");
    if (forceLowercase) { clean = clean.toLocaleLowerCase('tr-TR'); }
    return clean;
}

function processUltraEngine(inputElementId, forceLowercase = false) {
    const inputArea = document.getElementById(inputElementId);
    if (!inputArea || !inputArea.innerHTML.trim()) return "";
    let rawHtml = inputArea.innerHTML;
    let textWithProtectedBolds = hardProtectBoldStyles(rawHtml);
    let sandbox = document.createElement("div");
    sandbox.innerHTML = textWithProtectedBolds;
    let rawLines = sandbox.innerHTML.split('\n');
    let dynamicResultLines = [];
    rawLines.forEach(line => {
        let cleanedLine = cleanInvisibleWebGarbage(line, forceLowercase);
        dynamicResultLines.push(cleanedLine.trim());
    });
    return highlight(dynamicResultLines.join("<br>"));
}

function copyToClipboard(elementId) { const element = document.getElementById(elementId); const clone = element.cloneNode(true); let finalFormattedHTML = `<span style="font-size: 14px;">${clone.innerHTML}</span>`; const blob = new Blob([finalFormattedHTML], { type: 'text/html' }); const data = [new ClipboardItem({ 'text/html': blob })]; navigator.clipboard.write(data).then(() => { showToast(); }); }
function cleanSpaces(){ document.getElementById("output1").innerHTML = processUltraEngine("input1", false); }
function fixText(){ document.getElementById("output2").innerHTML = processUltraEngine("input2", true); }
window.addEventListener("DOMContentLoaded", function() { const darkDot = document.querySelector(".id-dark-dot"); if (darkDot) { changeTheme('dark', darkDot); } initPlayer(); });

/* ==========================================================================
   🎵 MÜZİK ÇALAR LOGIC
   ========================================================================== */
const musicList = [
    { title: "Siber Trance Track 1", url: "./muzikler/1.mp3" },
    { title: "Deep Focus Track 2", url: "./muzikler/2.mp3" }
];
let currentTrackIndex = 0; let isPlaying = false; let isShuffle = false; let isRepeat = false;
let audio = document.getElementById("main-audio"); let previousVolume = 1;

function initPlayer() { loadTrack(currentTrackIndex); audio.addEventListener("ended", () => isRepeat ? audio.play() : nextTrack()); audio.addEventListener("timeupdate", updateTimeline); audio.addEventListener("loadedmetadata", () => document.getElementById("total-duration").innerText = formatTime(audio.duration)); }
function loadTrack(index) { if(!musicList[index]) return; audio.src = musicList[index].url; document.getElementById("track-name").innerText = musicList[index].title; document.getElementById("track-index").innerText = `Şarkı: ${index + 1} / ${musicList.length}`; }
function togglePlay() { const playBtn = document.getElementById("play-pause-btn"); if (isPlaying) { audio.pause(); isPlaying = false; playBtn.innerText = "▶ OYNAT"; } else { audio.play().catch(e=>console.log(e)); isPlaying = true; playBtn.innerText = "⏸ DURDUR"; } }
function nextTrack() { currentTrackIndex = (currentTrackIndex + 1) % musicList.length; loadTrack(currentTrackIndex); if (isPlaying) audio.play(); }
function prevTrack() { currentTrackIndex = (currentTrackIndex - 1 + musicList.length) % musicList.length; loadTrack(currentTrackIndex); if (isPlaying) audio.play(); }
function updateTimeline() { const progress = document.getElementById("timeline-progress"); if (audio.duration) { progress.style.width = `${(audio.currentTime / audio.duration) * 100}%`; document.getElementById("current-time").innerText = formatTime(audio.currentTime); } }
function formatTime(secs) { const m = Math.floor(secs / 60); const s = Math.floor(secs % 60); return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`; }
function changeVolume(val) { audio.volume = val; }
function muteToggle() { const slider = document.getElementById("volume-slider"); if(audio.volume > 0) { previousVolume = audio.volume; changeVolume(0); slider.value = 0; } else { changeVolume(previousVolume); slider.value = previousVolume; } }
function togglePlayerMinimize() { document.getElementById("cyber-audio-player").classList.toggle("minimized"); }

/* ==========================================================================
   ☕ KAHVE MOLASI MOTORU (10 SN GEÇİŞLİ & SEFFAF SÖZLER)
   ========================================================================== */
let coffeeInterval = null;
function startCoffeeBreak() {
    document.body.classList.add("coffee-blur-active");
    document.getElementById("coffee-modal").classList.add("show");
    showRandomCoffeeQuote();
    
    coffeeInterval = setInterval(() => {
        const quoteEl = document.getElementById("coffee-quote");
        quoteEl.classList.add("fade");
        setTimeout(() => {
            showRandomCoffeeQuote();
            quoteEl.classList.remove("fade");
        }, 1200);
    }, 10000);
}
function endCoffeeBreak() {
    document.body.classList.remove("coffee-blur-active");
    document.getElementById("coffee-modal").classList.remove("show");
    clearInterval(coffeeInterval);
}
function showRandomCoffeeQuote() {
    document.getElementById("coffee-quote").innerText = coffeeQuotes[Math.floor(Math.random() * coffeeQuotes.length)];
}

/* ==========================================================================
   🔥 TENGRİ KAOS FİZİK MOTORU (DELİ GİBİ HAREKET EDEN BUTONLAR)
   ========================================================================== */
let isChaosActive = false;
let physicsInterval = null;
let elementsPhysicsData = [];

function startTengriChaosEngine() {
    if (isChaosActive) return;
    isChaosActive = true;
    
    // 1. Şarkıyı 2X Hıza Al
    audio.playbackRate = 2.0;
    
    // 2. Ekran Ortasındaki Büyük Tengri Görselini Aç
    document.getElementById("tengri-center-image").style.display = "block";
    
    // 3. Ekrandaki tüm tıklanabilir butonları ve interaktif ögeleri topla
    const items = document.querySelectorAll("button, .tab-btn, .theme-dot, .oracle-sphere");
    elementsPhysicsData = [];
    
    items.forEach((el) => {
        const rect = el.getBoundingClientRect();
        
        // Elemanların yerleşimlerini bozmadan fixed'e geçirerek bağımsız yapıyoruz
        el.style.position = "fixed";
        el.style.zIndex = "100000";
        el.style.top = rect.top + "px";
        el.style.left = rect.left + "px";
        el.style.margin = "0";
        
        // Çok daha hızlı (deli gibi) hareket etmeleri için yüksek hız katsayıları
        elementsPhysicsData.push({
            element: el,
            x: rect.left,
            y: rect.top,
            vx: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 12 + 10), // Hızlandırıldı
            vy: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 12 + 10), // Hızlandırıldı
            width: rect.width,
            height: rect.height
        });
    });
    
    // 4. Fizik sekme simülasyonunu başlat
    physicsInterval = setInterval(() => {
        const screenW = window.innerWidth;
        const screenH = window.innerHeight;
        
        elementsPhysicsData.forEach(item => {
            item.x += item.vx;
            item.y += item.vy;
            
            // Sağ - Sol Sekme Kontrolü
            if (item.x <= 0) { item.x = 0; item.vx *= -1; }
            if (item.x + item.width >= screenW) { item.x = screenW - item.width; item.vx *= -1; }
            
            // Üst - Alt Sekme Kontrolü
            if (item.y <= 0) { item.y = 0; item.vy *= -1; }
            if (item.y + item.height >= screenH) { item.y = screenH - item.height; item.vy *= -1; }
            
            item.element.style.left = item.x + "px";
            item.element.style.top = item.y + "px";
        });
    }, 16);
}

function stopTengriChaosEngine() {
    isChaosActive = false;
    clearInterval(physicsInterval);
    
    // 1. Şarkı Hızını Normale Çek
    audio.playbackRate = 1.0;
    
    // 2. Ortadaki Büyük Tengri Görselini Kapat
    document.getElementById("tengri-center-image").style.display = "none";
    
    // 3. Elemanları Eski Konumlarına ve Akışlarına Bırak
    elementsPhysicsData.forEach(item => {
        item.element.style.position = "";
        item.element.style.top = "";
        item.element.style.left = "";
        item.element.style.zIndex = "";
    });
    elementsPhysicsData = [];
}
</script>
