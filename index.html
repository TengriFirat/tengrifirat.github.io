<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metin Temizleyici</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    background:#050b17;
    color:white;
    font-family:Arial,sans-serif;
}

/* ÜST BUTON */
.top-nav{
    text-align:center;
    margin-bottom:20px;
}

.nav-btn{
    display:inline-block;
    background:#000;
    color:#fff;
    text-decoration:none;
    border:1px solid #333;
    padding:10px 18px;
    border-radius:6px;
    font-weight:bold;
    transition:.2s;
}

.nav-btn:hover{
    background:#1a1a1a;
}

/* TEXTAREA */
textarea{
    width:100%;
    height:200px;
    background:#0d1628;
    color:white;
    border:1px solid #23324d;
    padding:12px;
    font-size:14px;
    margin-bottom:10px;
}

/* OUTPUT (editable) */
#output{
    width:100%;
    min-height:220px;
    background:#0d1628;
    border:1px solid #23324d;
    padding:12px;
    outline:none;
    white-space:pre-wrap;
    border-radius:6px;
}

/* BUTTON */
.buttons{
    margin:10px 0;
}

button{
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px 15px;
    margin-right:10px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1a1a1a;
}

/* YASAKLI KELİME */
.red{
    color:#ff4040;
    font-weight:bold;
}

/* ===================== */
/* 🔥 TENGRİ ANİMASYON */
/* ===================== */

.watermark{
    position:fixed;
    bottom:10px;
    left:0;
    width:100%;
    text-align:center;
    font-size:44px;
    font-weight:900;
    letter-spacing:10px;
    pointer-events:none;
    user-select:none;

    background:linear-gradient(
        90deg,
        #ffb300,
        #ff5500,
        #ffffff,
        #ff5500,
        #ffb300
    );
    background-size:300% 100%;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation: glowMove 4s linear infinite,
               pulse 1.8s ease-in-out infinite;
}

/* renk akışı */
@keyframes glowMove{
    0%{background-position:0% 50%;}
    100%{background-position:300% 50%;}
}

/* titreşim + parıltı */
@keyframes pulse{
    0%,100%{
        transform:scale(1);
        filter:drop-shadow(0 0 10px rgba(255,140,0,.5));
    }
    50%{
        transform:scale(1.05);
        filter:drop-shadow(0 0 25px rgba(255,180,0,.9));
    }
}
</style>
</head>

<body>

<!-- ÜST BUTON -->
<div class="top-nav">
    <a href="https://tengrifirat2.github.io/" class="nav-btn">
        Türkçe Yazım Düzenleyici
    </a>
</div>

<h2>Metni yapıştır</h2>

<textarea id="input"></textarea>

<div class="buttons">
    <button onclick="cleanText()">Temizle</button>
    <button onclick="copyText()">Kopyala</button>
    <button onclick="clearAll()">Sil</button>
</div>

<!-- EDITABLE OUTPUT -->
<div id="output" contenteditable="true"></div>

<!-- 🔥 TENGRİ -->
<div class="watermark">⚔️ TENGRİ ⚔️</div>

<script>

function cleanText(){

    let text = document.getElementById("input").value;

    text = text.replace(/\u00A0/g," ");

    text = text
        .split("\n")
        .map(l => l.replace(/\s+/g," ").trim())
        .filter(l => l.length>0)
        .join("\n");

    const keywords = [
        "yüksek kaliteli",
        "yüksek kalite",
        "hakiki deri",
        "gerçek deri",
        "unisex",
        "birinci sınıf",
        "1. kalite",
        "1. sınıf",
        "%100 deri"
    ];

    keywords.forEach(word=>{
        const regex = new RegExp(word,"gi");

        text = text.replace(regex, match=>{
            return `<span class="red">${match}</span>`;
        });
    });

    document.getElementById("output").innerHTML = text;
}

function copyText(){
    const text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
}

function clearAll(){
    document.getElementById("input").value="";
    document.getElementById("output").innerHTML="";
}

</script>

</body>
</html>
