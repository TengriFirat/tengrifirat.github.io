<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HepsiBurada Panel</title>

<style>
/* ==========================================================================
   EPIC PREMIUM COLOR THEMES (MAT, AĞIRBAŞLI VE LÜKS)
   ========================================================================== */

:root {
    --bg-main: #000000;
    --bg-container: #09090a;
    --bg-input: #020203;
    --bg-btn: #121214;
    --bg-btn-hover: #1a1a1e;
    --bg-tab-active: #1a1a1e;
    --text-main: #8e8e93;
    --text-input: #f2f2f7;
    --text-heading: #ffffff;
    --text-btn: #aeaeb2;
    --border-color: #242426;
    --border-container: #1c1c1e;
    --accent-color: #f2f2f7; 
    --accent-glow: rgba(255, 255, 255, 0.15);
}

html[data-theme="crimson"] {
    --bg-main: #0c0808; --bg-container: #161010; --bg-input: #080505; --bg-btn: #241818; --bg-btn-hover: #332222; --bg-tab-active: #332222; --text-main: #b8a0a0; --text-input: #f5eded; --text-heading: #ffffff; --text-btn: #e63946; --border-color: #402b2b; --border-container: #2e1f1f; --accent-color: #d62828; --accent-glow: rgba(214, 40, 40, 0.4);
}
html[data-theme="blue"] {
    --bg-main: #080c14; --bg-container: #101624; --bg-input: #05080d; --bg-btn: #182238; --bg-btn-hover: #22304f; --bg-tab-active: #22304f; --text-main: #a0b0c8; --text-input: #edf3f8; --text-heading: #ffffff; --text-btn: #4ea8de; --border-color: #2b3d61; --border-container: #1f2c47; --accent-color: #0077b6; --accent-glow: rgba(0, 119, 182, 0.4);
}
html[data-theme="green"] {
    --bg-main: #060c08; --bg-container: #0d1a12; --bg-input: #040906; --bg-btn: #162e20; --bg-btn-hover: #1f422e; --bg-tab-active: #1f422e; --text-main: #9ebda8; --text-input: #ecf5ef; --text-heading: #ffffff; --text-btn: #52b788; --border-color: #275239; --border-container: #1c3b29; --accent-color: #2d6a4f; --accent-glow: rgba(45, 106, 79, 0.4);
}
html[data-theme="purple"] {
    --bg-main: #0a0712; --bg-container: #151024; --bg-input: #06040d; --bg-btn: #211938; --bg-btn-hover: #2f244f; --bg-tab-active: #2f244f; --text-main: #a8a0c8; --text-input: #f0edf8; --text-heading: #ffffff; --text-btn: #b5179e; --border-color: #3b2d61; --border-container: #2a2047; --accent-color: #7209b7; --accent-glow: rgba(114, 9, 183, 0.4);
}
html[data-theme="pink"] {
    --bg-main: #0f070b; --bg-container: #1f1019; --bg-input: #0a0408; --bg-btn: #331a29; --bg-btn-hover: #472439; --bg-tab-active: #472439; --text-main: #cda2bd; --text-input: #faf0f6; --text-heading: #ffffff; --text-btn: #ff758f; --border-color: #592d47; --border-container: #422135; --accent-color: #ff4d6d; --accent-glow: rgba(255, 77, 109, 0.4);
}
html[data-theme="yellow"] {
    --bg-main: #0d0c04; --bg-container: #1c1a09; --bg-input: #090802; --bg-btn: #2e2a10; --bg-btn-hover: #403b16; --bg-tab-active: #403b16; --text-main: #cfcb9e; --text-input: #fbfbfa; --text-heading: #ffffff; --text-btn: #ffd166; --border-color: #524b1c; --border-container: #3d3815; --accent-color: #ffb703; --accent-glow: rgba(255, 183, 3, 0.4);
}
html[data-theme="orange"] {
    --bg-main: #0d0a06; --bg-container: #1c150d; --bg-input: #080604; --bg-btn: #2b2114; --bg-btn-hover: #372d1d; --bg-tab-active: #372d1d; --text-main: #c2b29e; --text-input: #f7f3ed; --text-heading: #ffffff; --text-btn: #f3a712; --border-color: #403b26; --border-container: #3b2e1c; --accent-color: #e67e22; --accent-glow: rgba(230, 126, 34, 0.4);
}
html[data-theme="slate"] {
    --bg-main: #121315; --bg-container: #1e2024; --bg-input: #0b0c0d; --bg-btn: #2d3138; --bg-btn-hover: #3f444f; --bg-tab-active: #3f444f; --text-main: #949a8c; --text-input: #f1f2f4; --text-heading: #ffffff; --text-btn: #90e0ef; --border-color: #474d59; --border-container: #333840; --accent-color: #00b4d8; --accent-glow: rgba(0, 180, 216, 0.3);
}
html[data-theme="white"] {
    --bg-main: #f1f3f6; --bg-container: #ffffff; --bg-input: #f8fafc; --bg-btn: #e4e9f0; --bg-btn-hover: #d1d9e6; --bg-tab-active: #ffffff; --text-main: #4a5568; --text-input: #1a202c; --text-heading: #1a202c; --text-btn: #4a5568; --border-color: #cbd5e1; --border-container: #e2e8f0; --accent-color: #2d3748; --accent-glow: rgba(45, 55, 72, 0.1);
}

*{box-sizing:border-box;}
body {
    margin:0;
    padding:20px 140px 140px 140px;
    background: var(--bg-main) !important; 
    color: var(--text-main) !important;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    overflow-x:hidden;
    min-height: 100vh;
    transition: background 0.25s ease, color 0.25s ease;
}

/* 🏹 TENGRİ CHAOS IMAGES (Sadece Tengri yazılınca tetiklenir) */
.tengri-side-banner {
    position: fixed;
    top: 0;
    width: 120px;
    height: 100vh;
    object-fit: cover;
    opacity: 0;
    z-index: 9999;
    pointer-events: none;
    transition: opacity 0.3s ease;
}
.tengri-left { left: 0; border-right: 1px solid var(--accent-color); }
.tengri-right { right: 0; border-left: 1px solid var(--accent-color); }

.tengri-watermark-bg {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 140px;
    height: auto;
    opacity: 0;
    pointer-events: none;
    user-select: none;
    z-index: 1;
    transition: opacity 0.3s ease;
}

.tengri-overlay {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    max-width: 80vw; max-height: 70vh;
    z-index: 100000;
    pointer-events: none;
    border: 3px solid var(--accent-color);
    box-shadow: 0 0 50px var(--accent-glow);
}

/* ☕ RE-DESIGNED PREMIUM COFFEE OVERLAY */
.coffee-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 100005;
    align-items: center;
    justify-content: center;
}
.coffee-overlay.active { display: flex; }
.coffee-modal-card {
    background: var(--bg-container);
    border: 1px solid var(--border-color);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 40px var(--accent-glow);
    max-width: 480px;
    width: 90%;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
}

/* Şık Modern Kahve Kupası ve Duman Efekti */
.coffee-cup-art {
    position: relative;
    width: 70px;
    height: 65px;
    background: linear-gradient(135deg, var(--text-heading) 0%, var(--text-btn) 100%);
    border-radius: 4px 4px 30px 30px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset -5px -5px 10px rgba(0,0,0,0.1);
    margin-top: 35px;
}
.coffee-cup-handle {
    position: absolute;
    right: -16px; top: 10px;
    width: 22px; height: 32px;
    border: 6px solid var(--text-heading);
    border-left: none;
    border-radius: 0 16px 16px 0;
}
.coffee-cup-plate {
    position: absolute;
    bottom: -8px; left: -15px;
    width: 100px; height: 8px;
    background: var(--text-heading);
    border-radius: 4px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.steam-container {
    position: absolute;
    top: -35px; left: 15px;
    display: flex;
    gap: 10px;
}
.steam-puff {
    width: 5px; height: 30px;
    background: linear-gradient(to top, var(--text-heading), transparent);
    border-radius: 10px;
    filter: blur(2px);
    opacity: 0;
    animation: advancedSteam 2.5s infinite ease-in-out;
}
.steam-puff:nth-child(1) { animation-delay: 0.2s; }
.steam-puff:nth-child(2) { animation-delay: 0.8s; height: 35px; top: -5px; }
.steam-puff:nth-child(3) { animation-delay: 1.4s; }

@keyframes advancedSteam {
    0% { transform: translateY(10px) scaleX(0.8) skewX(-5deg); opacity: 0; }
    40% { opacity: 0.5; }
    80% { transform: translateY(-20px) scaleX(1.5) skewX(10deg); opacity: 0.1; }
    100% { transform: translateY(-35px) scaleX(2) opacity: 0; }
}

.coffee-modal-timer {
    font-size: 54px;
    font-weight: 800;
    font-family: monospace;
    color: var(--text-heading);
    letter-spacing: 2px;
    text-shadow: 0 0 15px var(--accent-glow);
}
.coffee-modal-quote {
    font-size: 15px;
    color: var(--text-input);
    font-style: italic;
    line-height: 1.6;
    min-height: 60px;
}

/* GENEL ARAYÜZ ELEMANLARI */
.theme-selector { display: flex; justify-content: flex-end; gap: 12px; max-width: 900px; margin: 0 auto 20px auto; align-items: center; background: var(--bg-container); padding: 12px 18px; border-radius: 8px; border: 1px solid var(--border-container); position: relative; z-index: 10; }
.theme-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; color: var(--text-main); opacity: 0.8; }
.theme-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; }
.theme-dot.active { border-color: var(--text-heading) !important; transform: scale(1.1); box-shadow: 0 0 12px var(--accent-color); }

.oracle-box { max-width: 900px; margin: 0 auto 25px auto; background: var(--bg-container); border: 1px solid var(--border-container); border-radius: 10px; padding: 20px; display: flex; align-items: center; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; overflow: hidden; }
.oracle-sphere { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, var(--text-heading), var(--accent-color)); box-shadow: 0 0 20px var(--accent-glow); display: flex; align-items: center; justify-content: center; font-size: 24px; user-select: none; }
.oracle-text-area { flex-grow: 1; }
.oracle-title { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-color); font-weight: 700; margin-bottom: 4px; }
.oracle-quote { font-size: 14px; color: var(--text-input); font-style: italic; line-height: 1.5; }

.top-widgets-container { display: flex; justify-content: space-between; max-width: 900px; margin: 0 auto 25px auto; gap: 20px; position: relative; z-index: 10; }
.top-widgets-container .oracle-box { margin: 0; flex-grow: 1; }
.coffee-break-widget { width: 320px; background: var(--bg-container); border: 1px solid var(--border-container); border-radius: 10px; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
.coffee-btn { width: 100%; padding: 10px; font-size: 11px; letter-spacing: 1px; }

.tabs{ display:flex; justify-content:center; gap:12px; margin-bottom:25px; position: relative; z-index: 10; }
button, .tab-btn { background: var(--bg-btn); color: var(--text-btn); border: 1px solid var(--border-color); padding: 12px 26px; font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; border-radius: 6px; transition: all 0.2s ease; position: relative; }
button:hover, .tab-btn:hover { color: var(--text-heading) !important; background: var(--bg-btn-hover); border-color: var(--accent-color); }
.tab-btn.active { background: var(--bg-tab-active) !important; color: var(--text-heading) !important; border-color: var(--accent-color) !important; box-shadow: 0 0 15px var(--accent-glow); }

.container{ position:relative; width:100%; max-width: 900px; margin: 0 auto; z-index: 10; }
.tab-content{ position:absolute; width:100%; opacity:0; transform:scale(0.99); transition: all .25s ease-in-out; pointer-events:none; background: var(--bg-container); padding: 28px; border-radius: 10px; border: 1px solid var(--border-container); box-shadow: 0 20px 40px rgba(0,0,0,0.4); overflow: hidden; }
.tab-content.active{ opacity:1; transform:scale(1); position:relative; pointer-events:auto; }

h3 { color: var(--text-heading); font-size: 14px; margin-top: 0; margin-bottom: 22px; letter-spacing: 1px; text-transform: uppercase; border-left: 3px solid var(--accent-color); padding-left: 12px; font-weight: 600; }
.input-area, .output{ width:100%; height:220px; background: var(--bg-input); color: var(--text-input); border: 1px solid var(--border-color); padding:16px; font-size: 14px; line-height: 1.6; border-radius: 6px; outline: none; margin-bottom: 6px; overflow-y: auto; word-break: break-word; font-family: inherit; position: relative; z-index: 2; }
.output{ min-height:220px; height: auto; border-style: dashed; }
.meta-info { font-size: 11px; color: var(--text-main); margin-bottom: 18px; display: flex; gap: 18px; opacity: 0.7; }
.action-buttons { margin-bottom: 25px; display: flex; gap: 12px; flex-wrap: wrap; }
.bad-word{ color:#ff3366; font-weight:600; background:rgba(255, 51, 102, 0.08); border: 1px solid rgba(255, 51, 102, 0.3); padding:2px 6px; border-radius:4px; }
.toast { position: fixed; top: -100px; right: 25px; background: var(--bg-container); border: 1px solid var(--accent-color); color: var(--text-heading); padding: 14px 28px; border-radius: 6px; font-size: 12px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10000; }
.toast.show { top: 25px; }

/* 🎵 AUDIO PLAYER */
.cyber-player { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-container); border-top: 1px solid var(--border-container); padding: 10px 30px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 -10px 30px rgba(0,0,0,0.6); z-index: 9999; transition: transform 0.4s; }
.cyber-player.minimized { transform: translateY(100%); }
.player-toggle-btn { position: absolute; right: 30px; top: -24px; background: var(--bg-container); border: 1px solid var(--border-container); border-bottom: none; padding: 4px 14px; font-size: 10px; font-weight: bold; border-radius: 6px 6px 0 0; color: var(--text-main); }
.player-top-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
.player-info { display: flex; align-items: center; gap: 12px; width: 30%; }
.player-icon { font-size: 18px; }
.track-details { display: flex; flex-direction: column; }
.track-name { color: var(--text-heading); font-size: 12px; font-weight: 600; }
.track-index { color: var(--text-main); font-size: 10px; opacity: 0.5; }
.player-controls { display: flex; align-items: center; gap: 6px; }
.player-btn { padding: 6px 12px; font-size: 10px; background: var(--bg-btn); border: 1px solid var(--border-color); }
.volume-control-wrapper { display: flex; align-items: center; gap: 8px; margin-left: 10px; }
.volume-slider { width: 70px; height: 4px; }
.player-timeline-wrapper { display: flex; align-items: center; gap: 10px; width: 100%; }
.time-display { font-size: 11px; font-family: monospace; color: var(--text-main); }
.timeline-container { flex-grow: 1; height: 4px; background: var(--bg-input); position: relative; cursor: pointer; }
.timeline-progress { height: 100%; width: 0%; background: var(--accent-color); }

.tengri-chaos-active button, .tengri-chaos-active .tab-btn {
    position: fixed !important;
    z-index: 999998 !important;
}
</style>
</head>
<body>

<img id="tengri-left" class="tengri-side-banner tengri-left" src="tengri.jpg" alt="Tengri Left">
<img id="tengri-right" class="tengri-side-banner tengri-right" src="tengri.jpg" alt="Tengri Right">
<img id="tengri-screen" class="tengri-overlay" src="tengri.jpg" alt="Tengri Chaos">

<div id="coffee-break-modal" class="coffee-overlay">
    <div class="coffee-modal-card">
        <div class="coffee-cup-art">
            <div class="steam-container">
                <div class="steam-puff"></div>
                <div class="steam-puff"></div>
                <div class="steam-puff"></div>
            </div>
            <div class="coffee-cup-handle"></div>
            <div class="coffee-cup-plate"></div>
        </div>
        
        <div id="coffee-modal-timer" class="coffee-modal-timer">01:00</div>
        <div id="coffee-modal-quote" class="coffee-modal-quote"></div>
        <button onclick="stopCoffeeBreak()" style="margin-top: 10px; padding: 10px 20px; font-size: 11px;">Molayı Erken Bitir</button>
    </div>
</div>

<div class="theme-selector">
    <span class="theme-label">TEMA:</span>
    <div class="theme-dot id-dark-dot active" style="background: #1c1c1e; border: 1px solid #3a3a3c;" onclick="changeTheme('dark', this)"></div>
    <div class="theme-dot" style="background: #d62828;" onclick="changeTheme('crimson', this)"></div>
    <div class="theme-dot" style="background: #0077b6;" onclick="changeTheme('blue', this)"></div>
    <div class="theme-dot" style="background: #2d6a4f;" onclick="changeTheme('green', this)"></div>
    <div class="theme-dot" style="background: #7209b7;" onclick="changeTheme('purple', this)"></div>
    <div class="theme-dot" style="background: #ff4d6d;" onclick="changeTheme('pink', this)"></div>
    <div class="theme-dot" style="background: #ffb703;" onclick="changeTheme('yellow', this)"></div>
    <div class="theme-dot" style="background: #e67e22;" onclick="changeTheme('orange', this)"></div>
    <div class="theme-dot" style="background: #474d59;" onclick="changeTheme('slate', this)"></div>
    <div class="theme-dot" style="background: #ffffff; border: 1px solid #cbd5e1;" onclick="changeTheme('white', this)"></div>
</div>

<div class="top-widgets-container">
    <div class="oracle-box">
        <div class="oracle-sphere" onclick="getTengriOracle()">🔮</div>
        <div class="oracle-text-area">
            <div class="oracle-title">⚡ ORACLE / GÜNÜN SİBER KEHANETİ</div>
            <div id="oracle-display" class="oracle-quote">Küreye tıkla og siber kaderinle yüzleş...</div>
        </div>
    </div>
    <div class="coffee-break-widget">
        <button class="coffee-btn" onclick="startCoffeeBreak()">☕ KAHVE MOLASI VER</button>
    </div>
</div>

<div id="toast-notification" class="toast">⚡ METİN BAŞARIYLA KOPYALANDI!</div>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Boşluk Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım Düzenleyici</button>
</div>

<div class="container">
    <div class="tab-content active">
        <img id="tengri-w1" class="tengri-watermark-bg" src="tengri.jpg" alt="Watermark">
        <h3>Metni buraya yapıştır aslan parçası</h3>
        <div id="input1" class="input-area" contenteditable="true" oninput="checkInputChaos(1)"></div>
        <div class="meta-info">
            <span id="char-count-1">Karakter: <strong>0</strong></span>
            <span id="word-count-1">Kelime: <strong>0</strong></span>
        </div>
        <div class="action-buttons">
            <button onclick="cleanSpaces()">Temizle</button>
            <button onclick="copy1()">Kopyala</button>
            <button onclick="clear1()">Sil</button>
        </div>
        <div id="output1" class="output" contenteditable="true"></div>
    </div>

    <div class="tab-content">
        <img id="tengri-w2" class="tengri-watermark-bg" src="tengri.jpg" alt="Watermark">
        <h3>Metni buraya yapıştır aslan parçası</h3>
        <div id="input2" class="input-area" contenteditable="true" oninput="checkInputChaos(2)"></div>
        <div class="meta-info">
            <span id="char-count-2">Karakter: <strong>0</strong></span>
            <span id="word-count-2">Kelime: <strong>0</strong></span>
        </div>
        <div class="action-buttons">
            <button onclick="fixText()">Düzelt</button>
            <button onclick="copy2()">Kopyala</button>
            <button onclick="clear2()">Sil</button>
        </div>
        <div id="output2" class="output" contenteditable="true"></div>
    </div>
</div>

<div id="cyber-audio-player" class="cyber-player">
    <button id="player-toggle" class="player-toggle-btn" onclick="togglePlayerMinimize()">▼ AŞAĞI KAYDIR</button>
    <div class="player-top-row">
        <div class="player-info">
            <div class="player-icon">💿</div>
            <div class="track-details">
                <div id="track-name" class="track-name"></div>
                <div id="track-index" class="track-index"></div>
            </div>
        </div>
        <div class="player-controls">
            <button class="player-btn" onclick="prevTrack()">⏮</button>
            <button id="play-pause-btn" class="player-btn" onclick="togglePlay()">▶ OYNAT</button>
            <button class="player-btn" onclick="nextTrack()">⏭</button>
            <button id="shuffle-btn" class="player-btn" onclick="toggleShuffle()">🔀</button>
            <button id="repeat-btn" class="player-btn" onclick="toggleRepeat()">🔁</button>
            <div class="volume-control-wrapper">
                <span class="volume-icon">🔊</span>
                <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.05" value="0.8" oninput="changeVolume(this.value)">
            </div>
        </div>
    </div>
    <div class="player-timeline-wrapper">
        <span id="current-time" class="time-display">00:00</span>
        <div id="timeline-container" class="timeline-container" onclick="seekTrack(event)">
            <div id="timeline-progress" class="timeline-progress"></div>
        </div>
        <span id="total-duration" class="time-display">00:00</span>
    </div>
    <audio id="main-audio"></audio>
</div>

<script>
const oracleQuotes = [
    "Bugün metinlerden sileceğin gereksiz boşluklar gibi, hayatındaki gereksiz insanları da şak diye sileceksin. Temiz ferah gün yakın.",
    "Yakın gelecekte senin için çok büyük bir başarı ve zenginlik görüyorum. Tabii 'yakın gelecek' siber evrende 40-50 yıl anlamına gelebilir, o yüzden sen şimdilik şu metne odaklan."
];

const motivationQuotes = [
    "Harika gidiyorsun! Şu ana kadar neleri başardığını hatırla ve derin bir nefes al.",
    "Sen bir kod veya metin yığınından çok daha fazlasısın. Emeğin gerçekten değerli.",
    "Küçük adımlar büyük yollar açar. Bu mola senin en doğal hakkındı, tadını çıkar.",
    "Her şey üst üste gelse de senin içindeki gücü hiçbir revizyon söküp alamaz.",
    "Kendine güven şampiyon! Bugün halledemeyeceğin hiçbir karmaşa yok."
];

function getTengriOracle() { const display = document.getElementById("oracle-display"); display.classList.add("glitch-effect"); setTimeout(() => { const randomIndex = Math.floor(Math.random() * oracleQuotes.length); display.innerText = oracleQuotes[randomIndex]; display.classList.remove("glitch-effect"); }, 200); }
function changeTheme(themeName, element) { if(themeName === 'dark') { document.documentElement.removeAttribute('data-theme'); } else { document.documentElement.setAttribute('data-theme', themeName); } document.querySelectorAll('.theme-dot').forEach(dot => dot.classList.remove('active')); element.classList.add('active'); }
function showToast() { const toast = document.getElementById("toast-notification"); toast.classList.add("show"); setTimeout(() => { toast.classList.remove("show"); }, 2000); }
function calculateMeta(tabIndex) { const text = document.getElementById(`input${tabIndex}`).innerText; document.getElementById(`char-count-${tabIndex}`).innerHTML = `Karakter: <strong>${text.length}</strong>`; document.getElementById(`word-count-${tabIndex}`).innerHTML = `Kelime: <strong>${text.trim() === "" ? 0 : text.trim().split(/\s+/).length}</strong>`; }
function openTab(i){ document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active")); document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active")); document.querySelectorAll(".tab-content")[i].classList.add("active"); document.querySelectorAll(".tab-btn")[i].classList.add("active"); }

const bannedWords = ["yüksek kalite", "yüksek kaliteli", "birinci sınıf"];
function highlight(text) { bannedWords.forEach(word => { const reg = new RegExp(word,"gi"); text = text.replace(reg, m => `<span class="bad-word">${m}</span>`); }); return text; }

function processUltraEngine(id, forceLower) {
    let txt = document.getElementById(id).innerText;
    if(!txt.trim()) return "";
    let clean = txt.replace(/\s{2,}/g, " ").trim();
    if(forceLower) { clean = clean.toLowerCase(); }
    return highlight(clean);
}

function cleanSpaces(){ document.getElementById("output1").innerHTML = processUltraEngine("input1", false); }
function fixText(){ document.getElementById("output2").innerHTML = processUltraEngine("input2", true); }
function copy1(){ navigator.clipboard.writeText(document.getElementById("output1").innerText); showToast(); }
function clear1(){ document.getElementById("input1").innerHTML=""; document.getElementById("output1").innerHTML=""; calculateMeta(1); }
function copy2(){ navigator.clipboard.writeText(document.getElementById("output2").innerText); showToast(); }
function clear2(){ document.getElementById("input2").innerHTML=""; document.getElementById("output2").innerHTML=""; calculateMeta(2); }

let coffeeInterval;
function startCoffeeBreak() {
    const modal = document.getElementById("coffee-break-modal");
    const timerEl = document.getElementById("coffee-modal-timer");
    const quoteEl = document.getElementById("coffee-modal-quote");
    modal.classList.add("active");
    let timeLeft = 60;
    timerEl.innerText = "01:00";
    quoteEl.innerText = motivationQuotes[Math.floor(Math.random() * motivationQuotes.length)];
    
    clearInterval(coffeeInterval);
    coffeeInterval = setInterval(() => {
        timeLeft--;
        timerEl.innerText = `00:${timeLeft < 10 ? '0' + timeLeft : timeLeft}`;
        if (timeLeft % 10 === 0 && timeLeft > 0) {
            quoteEl.innerText = motivationQuotes[Math.floor(Math.random() * motivationQuotes.length)];
        }
        if (timeLeft <= 0) { stopCoffeeBreak(); }
    }, 1000);
}
function stopCoffeeBreak() { clearInterval(coffeeInterval); document.getElementById("coffee-break-modal").classList.remove("active"); }

/* 🏹 AKTİF YENİLENMİŞ TENGRİ CHAOS MOTORU */
let chaosInterval;
function checkInputChaos(tabIndex) {
    calculateMeta(tabIndex);
    const val = document.getElementById(`input${tabIndex}`).innerText.toLowerCase();
    
    // Sayfadaki 4 farklı Tengri görsel elementi
    const lSide = document.getElementById("tengri-left");
    const rSide = document.getElementById("tengri-right");
    const overlay = document.getElementById("tengri-screen");
    const w1 = document.getElementById("tengri-w1");
    const w2 = document.getElementById("tengri-w2");
    
    if (val.includes("tengri")) {
        // "tengri" kelimesi yazılınca görseller anında ortaya çıkar
        lSide.style.opacity = "0.2";
        rSide.style.opacity = "0.2";
        w1.style.opacity = "0.08";
        w2.style.opacity = "0.08";
        
        if (!document.body.classList.contains("tengri-chaos-active")) {
            document.body.classList.add("tengri-chaos-active");
            overlay.style.display = "block";
            
            clearInterval(chaosInterval);
            chaosInterval = setInterval(() => {
                document.querySelectorAll("button, .tab-btn").forEach(btn => {
                    btn.style.left = Math.floor(Math.random() * (window.innerWidth - btn.offsetWidth)) + "px";
                    btn.style.top = Math.floor(Math.random() * (window.innerHeight - btn.offsetHeight)) + "px";
                });
            }, 150);
        }
    } else {
        // Kelime silindiğinde veya yokken her şey tamamen gizlenir
        lSide.style.opacity = "0";
        rSide.style.opacity = "0";
        w1.style.opacity = "0";
        w2.style.opacity = "0";
        resetChaosSystem();
    }
}

function resetChaosSystem() {
    clearInterval(chaosInterval);
    document.body.classList.remove("tengri-chaos-active");
    document.getElementById("tengri-screen").style.display = "none";
    document.querySelectorAll("button, .tab-btn").forEach(btn => {
        btn.style.position = ""; btn.style.left = ""; btn.style.top = "";
    });
}

// Minimal Audio Setup
const musicList = [{ title: "Siber Fon", url: "" }];
function initPlayer() { document.getElementById("track-index").innerText = "Şarkı: 1 / 1"; }
function togglePlay() {} function prevTrack() {} function nextTrack() {} function toggleShuffle() {} function toggleRepeat() {} function changeVolume() {} function seekTrack() {} function togglePlayerMinimize() { document.getElementById("cyber-audio-player").classList.toggle("minimized"); }
window.addEventListener("DOMContentLoaded", () => { initPlayer(); });
</script>
</body>
</html>
