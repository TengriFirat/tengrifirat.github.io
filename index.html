<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Satıcı Metin Editörü</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: white;
    overflow: hidden;
}

/* arka plan watermark */
body::before {
    content: "TENGRİ";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 120px;
    color: rgba(255,255,255,0.03);
    letter-spacing: 20px;
    z-index: 0;
    pointer-events: none;
}

.container {
    position: relative;
    z-index: 1;
    padding: 20px;
}

textarea {
    width: 100%;
    height: 180px;
    background: #111823;
    color: white;
    border: 1px solid #2a3442;
    padding: 10px;
    font-size: 14px;
    outline: none;
}

#output {
    margin-top: 15px;
    padding: 10px;
    background: #111823;
    border: 1px solid #2a3442;
    min-height: 120px;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h2>Satıcı Metin Editörü</h2>

<textarea id="input" placeholder="Metni buraya yapıştır..."></textarea>

<div id="output"></div>

</div>

<script>
function cleanAndHighlight(text) {

    const map = new Map();

    // HTML koru
    text = text.replace(/<(strong|b)>.*?<\/(strong|b)>/gi, m => {
        const k = "__STRONG_" + map.size + "__";
        map.set(k, m);
        return k;
    });

    text = text.replace(/<(em|i)>.*?<\/(em|i)>/gi, m => {
        const k = "__EM_" + map.size + "__";
        map.set(k, m);
        return k;
    });

    // NBSP temizle
    text = text.replace(/\u00A0/g, " ");

    // fazla boşluk temizle
    text = text.replace(/\s+/g, " ").trim();

    // 🔴 tüm varyasyonlar (case-insensitive + esnek)
    const keywords = [
        "yüksek kaliteli",
        "yüksek kalite",
        "hakiki deri",
        "gerçek deri",
        "unisex",
        "birinci sınıf",
        "1. kalite",
        "1 . kalite",
        "1. sınıf",
        "1 . sınıf",
        "%100 deri",
        "% 100 deri"
    ];

    keywords.forEach(word => {

        const regex = new RegExp(
            word
                .replace(/\./g, "\\.")
                .replace(/%/g, "%\\s*")
                .replace(/ /g, "\\s*"),
            "gi"
        );

        text = text.replace(regex, match => {
            return `<span style="color:#ff3b3b; font-weight:bold;">${match}</span>`;
        });
    });

    // geri yükle
    map.forEach((v, k) => {
        text = text.replace(k, v);
    });

    return text;
}

// input
document.getElementById("input").addEventListener("input", async function () {

    const result = cleanAndHighlight(this.value);

    const output = document.getElementById("output");
    output.innerHTML = result;

    // 🔥 GERÇEK otomatik kopyalama (fixli)
    try {
        const temp = document.createElement("textarea");
        temp.value = output.innerText; // düz metin kopyala
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
    } catch (e) {}
});
</script>

</body>
</html>
