<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Metin Temizleyici</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #070a10;
    color: white;
    overflow: hidden;
}

/* 🔥 Alevli TENGRİ efekti */
.watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 120px;
    font-weight: bold;
    letter-spacing: 15px;
    color: rgba(255, 80, 0, 0.08);
    text-shadow:
        0 0 10px rgba(255, 80, 0, 0.2),
        0 0 20px rgba(255, 120, 0, 0.2),
        0 0 40px rgba(255, 60, 0, 0.2);
    animation: flame 2s infinite alternate;
    pointer-events: none;
    z-index: 0;
}

@keyframes flame {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 0.08; }
    100% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.15; }
}

.container {
    position: relative;
    z-index: 1;
    padding: 20px;
}

textarea {
    width: 100%;
    height: 180px;
    background: #0f1624;
    color: white;
    border: 1px solid #2a3442;
    padding: 10px;
    font-size: 14px;
    outline: none;
}

#output {
    margin-top: 15px;
    padding: 10px;
    background: #0f1624;
    border: 1px solid #2a3442;
    min-height: 100px;
    white-space: pre-wrap;
}

button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    cursor: pointer;
    background: #ff3b3b;
    color: white;
    font-weight: bold;
    margin-right: 10px;
}

button:hover {
    background: #ff1f1f;
}
</style>
</head>

<body>

<div class="watermark">TENGRİ</div>

<div class="container">

<h2>Metin Temizleyici</h2>

<textarea id="input" placeholder="Metni buraya yapıştır..."></textarea>

<div>
    <button onclick="cleanText()">Temizle</button>
    <button onclick="copyText()">Kopyala</button>
</div>

<div id="output"></div>

</div>

<script>
let lastResult = "";

function cleanAndHighlight(text) {

    const map = new Map();

    text = text.replace(/<(strong|b)>.*?<\/(strong|b)>/gi, m => {
        const k = "__STRONG_" + map.size + "__";
        map.set(k, m);
        return k;
    });

    text = text.replace(/<(em|i)>.*?<\/(em|i)>/gi, m => {
        const k = "__EM_" + map.size + "__";
        map.set(k, m);
        return k;
    });

    text = text.replace(/\u00A0/g, " ");
    text = text.replace(/\s+/g, " ").trim();

    const keywords = [
        "yüksek kaliteli",
        "yüksek kalite",
        "hakiki deri",
        "gerçek deri",
        "unisex",
        "birinci sınıf",
        "1. kalite",
        "1 . kalite",
        "1. sınıf",
        "1 . sınıf",
        "%100 deri",
        "% 100 deri"
    ];

    keywords.forEach(word => {
        const regex = new RegExp(
            word.replace(/\./g, "\\.").replace(/%/g, "%\\s*").replace(/ /g, "\\s*"),
            "gi"
        );

        text = text.replace(regex, match => {
            return `<span style="color:#ff3b3b; font-weight:bold;">${match}</span>`;
        });
    });

    map.forEach((v, k) => {
        text = text.replace(k, v);
    });

    return text;
}

function cleanText() {
    const input = document.getElementById("input").value;
    lastResult = cleanAndHighlight(input);
    document.getElementById("output").innerHTML = lastResult;
}

function copyText() {
    const temp = document.createElement("textarea");
    temp.value = document.getElementById("output").innerText;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    document.body.removeChild(temp);
    alert("Kopyalandı!");
}
</script>

</body>
</html>
