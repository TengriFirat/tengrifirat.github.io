<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metin Temizleyici</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    background:#050b17;
    color:white;
    font-family:Arial,sans-serif;
}

.top-nav{
    text-align:center;
    margin-bottom:20px;
}

.nav-btn{
    display:inline-block;
    background:#000;
    color:#fff;
    text-decoration:none;
    border:1px solid #333;
    padding:10px 18px;
    border-radius:6px;
    font-weight:bold;
}

.nav-btn:hover{background:#1a1a1a;}

textarea{
    width:100%;
    height:200px;
    background:#0d1628;
    color:white;
    border:1px solid #23324d;
    padding:12px;
    font-size:14px;
}

#output{
    width:100%;
    min-height:200px;
    background:#0d1628;
    border:1px solid #23324d;
    padding:12px;
    white-space:pre-wrap;
}

.buttons{margin:10px 0;}

button{
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px 15px;
    margin-right:10px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{background:#1a1a1a;}

.red{
    color:#ff4040;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="top-nav">
    <a href="https://tengrifirat2.github.io/" class="nav-btn">
        Türkçe Yazım Düzenleyici
    </a>
</div>

<h2>Metni yapıştır</h2>

<textarea id="input"></textarea>

<div class="buttons">
    <button onclick="cleanText()">Temizle</button>
    <button onclick="copyText()">Kopyala</button>
    <button onclick="clearAll()">Sil</button>
</div>

<div id="output"></div>

<script>

function cleanText(){

    let text = document.getElementById("input").value;

    text = text.replace(/\u00A0/g," ");

    text = text
        .split("\n")
        .map(l => l.replace(/\s+/g," ").trim())
        .filter(l => l.length>0)
        .join("\n");

    const keywords = [
        "yüksek kaliteli",
        "yüksek kalite",
        "hakiki deri",
        "gerçek deri",
        "unisex",
        "birinci sınıf",
        "1. kalite",
        "1. sınıf",
        "%100 deri"
    ];

    keywords.forEach(word=>{
        const regex = new RegExp(word,"gi");
        text = text.replace(regex, match=>{
            return `<span class="red">${match}</span>`;
        });
    });

    document.getElementById("output").innerHTML = text;
}

function copyText(){
    const text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
}

function clearAll(){
    document.getElementById("input").value="";
    document.getElementById("output").innerHTML="";
}

</script>

</body>
</html>
