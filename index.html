<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metin Temizleyici</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#050b17;
    color:white;
    font-family:Arial,sans-serif;
}

/* Üst buton */
.top-nav{
    text-align:center;
    margin-bottom:20px;
}

.nav-btn{
    display:inline-block;
    background:#000000;
    color:#ffffff;
    text-decoration:none;
    border:1px solid #333333;
    padding:10px 18px;
    border-radius:6px;
    font-weight:bold;
}

.nav-btn:hover{
    background:#1a1a1a;
}

h2{
    margin-top:0;
    margin-bottom:15px;
}

/* input */
textarea{
    width:100%;
    height:250px;
    background:#0d1628;
    color:white;
    border:1px solid #23324d;
    padding:12px;
    resize:vertical;
    font-size:14px;
}

/* butonlar */
.buttons{
    margin:15px 0;
}

button{
    background:#000000;
    color:#ffffff;
    border:1px solid #333333;
    padding:10px 18px;
    cursor:pointer;
    font-weight:bold;
    margin-right:10px;
    border-radius:6px;
}

button:hover{
    background:#1a1a1a;
}

/* output artık textarea */
#output{
    width:100%;
    min-height:220px;
    background:#0d1628;
    color:white;
    border:1px solid #23324d;
    padding:12px;
    resize:vertical;
    font-size:14px;
}

.watermark{
    position:fixed;
    bottom:10px;
    left:0;
    width:100%;
    text-align:center;
    font-size:42px;
    font-weight:900;
    letter-spacing:8px;

    background:linear-gradient(
        90deg,
        #ffb300,
        #ff5500,
        #ffb300
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
        0 0 10px rgba(255,120,0,.4),
        0 0 20px rgba(255,120,0,.3);

    pointer-events:none;
    user-select:none;
}
</style>
</head>

<body>

<!-- ÜST BUTON -->
<div class="top-nav">
    <a href="https://tengrifirat2.github.io/" class="nav-btn">
        Türkçe Yazım Düzenleyici
    </a>
</div>

<h2>Metni buraya yapıştır aslan parçası</h2>

<textarea id="input"></textarea>

<div class="buttons">
    <button onclick="cleanText()">Temizle</button>
    <button onclick="copyText()">Kopyala</button>
    <button onclick="clearAll()">Sil</button>
</div>

<!-- ARTIK DÜZENLENEBİLİR ALAN -->
<textarea id="output"></textarea>

<div class="watermark">⚔️ TENGRİ ⚔️</div>

<script>

function cleanText(){

    let text = document.getElementById("input").value;

    // NBSP temizliği
    text = text.replace(/\u00A0/g, " ");
    text = text.replace(/&nbsp;/gi, " ");
    text = text.replace(/nbsp;/gi, " ");
    text = text.replace(/;nbsp/gi, " ");

    // fazla boşluk
    text = text
        .split("\n")
        .map(line => line.replace(/[ \t]+/g, " ").trim())
        .filter(line => line.length > 0)
        .join("\n");

    document.getElementById("output").value = text;
}

function copyText(){

    const text = document.getElementById("output").value;
    navigator.clipboard.writeText(text);
}

function clearAll(){

    document.getElementById("input").value = "";
    document.getElementById("output").value = "";
}

</script>

</body>
</html>
