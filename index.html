<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri Panel</title>

<style>
/* ==========================================================================
   EPIC PREMIUM COLOR THEMES (MAT, AĞIRBAŞLI VE LÜKS)
   ========================================================================== */

/* 1. DEFAULT: MIDNIGHT OLED (ZİFİRİ MAT DERİN SİYAH) */
:root {
    --bg-main: #000000;
    --bg-container: #09090a;
    --bg-input: #020203;
    --bg-btn: #121214;
    --bg-btn-hover: #1a1a1e;
    --bg-tab-active: #1a1a1e;
    --text-main: #8e8e93;
    --text-input: #f2f2f7;
    --text-heading: #ffffff;
    --text-btn: #aeaeb2;
    --border-color: #242426;
    --border-container: #1c1c1e;
    --accent-color: #f2f2f7; 
    --accent-glow: rgba(255, 255, 255, 0.15);
}

/* 2. CYBER CRIMSON (MAT PREMİUM KIRMIZI) */
html[data-theme="crimson"] {
    --bg-main: #0c0808;
    --bg-container: #161010;
    --bg-input: #080505;
    --bg-btn: #241818;
    --bg-btn-hover: #332222;
    --bg-tab-active: #332222;
    --text-main: #b8a0a0;
    --text-input: #f5eded;
    --text-heading: #ffffff;
    --text-btn: #e63946;
    --border-color: #402b2b;
    --border-container: #2e1f1f;
    --accent-color: #d62828; 
    --accent-glow: rgba(214, 40, 40, 0.4);
}

/* 3. DEEP SAPPHIRE (SOYLU LACİVERT / SAFİR) */
html[data-theme="blue"] {
    --bg-main: #080c14;
    --bg-container: #101624;
    --bg-input: #05080d;
    --bg-btn: #182238;
    --bg-btn-hover: #22304f;
    --bg-tab-active: #22304f;
    --text-main: #a0b0c8;
    --text-input: #edf3f8;
    --text-heading: #ffffff;
    --text-btn: #4ea8de;
    --border-color: #2b3d61;
    --border-container: #1f2c47;
    --accent-color: #0077b6; 
    --accent-glow: rgba(0, 119, 182, 0.4);
}

/* 4. EMERALD VELVET (LÜKS İNGİLİZ YEŞİLİ) */
html[data-theme="green"] {
    --bg-main: #060c08;
    --bg-container: #0d1a12;
    --bg-input: #040906;
    --bg-btn: #162e20;
    --bg-btn-hover: #1f422e;
    --bg-tab-active: #1f422e;
    --text-main: #9ebda8;
    --text-input: #ecf5ef;
    --text-heading: #ffffff;
    --text-btn: #52b788;
    --border-color: #275239;
    --border-container: #1c3b29;
    --accent-color: #2d6a4f; 
    --accent-glow: rgba(45, 106, 79, 0.4);
}

/* 5. AMETHYST DUSK (DERİN ASTRO MOR) */
html[data-theme="purple"] {
    --bg-main: #0a0712;
    --bg-container: #151024;
    --bg-input: #06040d;
    --bg-btn: #211938;
    --bg-btn-hover: #2f244f;
    --bg-tab-active: #2f244f;
    --text-main: #a8a0c8;
    --text-input: #f0edf8;
    --text-heading: #ffffff;
    --text-btn: #b5179e;
    --border-color: #3b2d61;
    --border-container: #2a2047;
    --accent-color: #7209b7; 
    --accent-glow: rgba(114, 9, 183, 0.4);
}

/* 6. ROSE QUARTZ (AĞIRBAŞLI PREMİUM PEMBE) */
html[data-theme="pink"] {
    --bg-main: #0f070b;
    --bg-container: #1f1019;
    --bg-input: #0a0408;
    --bg-btn: #331a29;
    --bg-btn-hover: #472439;
    --bg-tab-active: #472439;
    --text-main: #cda2bd;
    --text-input: #faf0f6;
    --text-heading: #ffffff;
    --text-btn: #ff758f;
    --border-color: #592d47;
    --border-container: #422135;
    --accent-color: #ff4d6d; 
    --accent-glow: rgba(255, 77, 109, 0.4);
}

/* 7. MUTED GOLD (AĞIRBAŞLI LÜKS SARI) */
html[data-theme="yellow"] {
    --bg-main: #0d0c04;
    --bg-container: #1c1a09;
    --bg-input: #090802;
    --bg-btn: #2e2a10;
    --bg-btn-hover: #403b16;
    --bg-tab-active: #403b16;
    --text-main: #cfcb9e;
    --text-input: #fbfbfa;
    --text-heading: #ffffff;
    --text-btn: #ffd166;
    --border-color: #524b1c;
    --border-container: #3d3815;
    --accent-color: #ffb703; 
    --accent-glow: rgba(255, 183, 3, 0.4);
}

/* 8. IMPERIAL AMBER (MAT KEHRİBAR / TURUNCU) */
html[data-theme="orange"] {
    --bg-main: #0d0a06;
    --bg-container: #1c150d;
    --bg-input: #080604;
    --bg-btn: #2b2114;
    --bg-btn-hover: #3d2f1d;
    --bg-tab-active: #3d2f1d;
    --text-main: #c2b29e;
    --text-input: #f7f3ed;
    --text-heading: #ffffff;
    --text-btn: #f3a712;
    --border-color: #4f3d26;
    --border-container: #3b2e1c;
    --accent-color: #e67e22; 
    --accent-glow: rgba(230, 126, 34, 0.4);
}

/* 9. TITANIUM SLATE (GUNMETAL GRİ) */
html[data-theme="slate"] {
    --bg-main: #121315;
    --bg-container: #1e2024;
    --bg-input: #0b0c0d;
    --bg-btn: #2d3138;
    --bg-btn-hover: #3f444f;
    --bg-tab-active: #3f444f;
    --text-main: #949a8c;
    --text-input: #f1f2f4;
    --text-heading: #ffffff;
    --text-btn: #90e0ef;
    --border-color: #474d59;
    --border-container: #333840;
    --accent-color: #00b4d8; 
    --accent-glow: rgba(0, 180, 216, 0.3);
}

/* 10. OBSIDIAN WHITE (YUMUŞAK PLATİN SUITE) */
html[data-theme="white"] {
    --bg-main: #f1f3f6;
    --bg-container: #ffffff;
    --bg-input: #f8fafc;
    --bg-btn: #e4e9f0;
    --bg-btn-hover: #d1d9e6;
    --bg-tab-active: #ffffff;
    --text-main: #4a5568;
    --text-input: #1a202c;
    --text-heading: #1a202c;
    --text-btn: #4a5568;
    --border-color: #cbd5e1;
    --border-container: #e2e8f0;
    --accent-color: #2d3748; 
    --accent-glow: rgba(45, 55, 72, 0.1);
}

*{box-sizing:border-box;}

html, body, .input-area, div { cursor: default; }
button, .tab-btn, .theme-dot { cursor: pointer; }

body {
    margin:0;
    padding:20px;
    background: var(--bg-main) !important; 
    color: var(--text-main) !important;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    overflow-x:hidden;
    min-height: 100vh;
    transition: background 0.25s ease, color 0.25s ease;
}

/* TEMA SEÇİCİ ALAN */
.theme-selector {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    max-width: 900px;
    margin: 0 auto 20px auto;
    align-items: center;
    background: var(--bg-container);
    padding: 12px 18px;
    border-radius: 8px;
    border: 1px solid var(--border-container);
}
.theme-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
    color: var(--text-main);
    opacity: 0.8;
}
.theme-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 2px 5px rgba(0,0,0,0.5);
}
.theme-dot:hover { transform: scale(1.2); }
.theme-dot.active {
    border-color: var(--text-heading) !important;
    transform: scale(1.1);
    box-shadow: 0 0 12px var(--accent-color);
}

/* SEKME ALANI */
.tabs{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:25px;
}

/* BUTONLAR */
button, .tab-btn {
    background: var(--bg-btn);
    color: var(--text-btn);
    border: 1px solid var(--border-color);
    padding: 12px 26px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-radius: 6px;
    transition: all 0.2s ease;
}
button:hover, .tab-btn:hover {
    color: var(--text-heading) !important;
    background: var(--bg-btn-hover);
    border-color: var(--accent-color); 
    box-shadow: 0 0 12px var(--accent-glow);
}
.tab-btn.active {
    background: var(--bg-tab-active) !important;
    color: var(--text-heading) !important;
    border-color: var(--accent-color) !important;
    box-shadow: 0 0 15px var(--accent-glow);
}

/* ANA PANEL CONTAINER */
.container{
    position:relative;
    width:100%;
    max-width: 900px;
    margin: 0 auto;
}
.tab-content{
    position:absolute;
    width:100%;
    opacity:0;
    transform:scale(0.99);
    transition: all .25s ease-in-out;
    pointer-events:none;
    background: var(--bg-container);
    padding: 28px;
    border-radius: 10px;
    border: 1px solid var(--border-container);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.tab-content.active{
    opacity:1;
    transform:scale(1);
    position:relative;
    pointer-events:auto;
}

h3 {
    color: var(--text-heading);
    font-size: 14px;
    margin-top: 0;
    margin-bottom: 22px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-left: 3px solid var(--accent-color);
    padding-left: 12px;
    font-weight: 600;
}

/* TEXTAREA ALANLARI */
.input-area, .output{
    width:100%;
    height:220px;
    background: var(--bg-input);
    color: var(--text-input);
    border: 1px solid var(--border-color);
    padding:16px;
    font-size: 14px; 
    line-height: 1.6;
    border-radius: 6px;
    outline: none;
    transition: all 0.2s ease;
    margin-bottom: 6px;
    overflow-y: auto;
    word-break: break-word;
    font-family: inherit;
}
.input-area:focus, .output:focus {
    border-color: var(--accent-color);
    box-shadow: 0 0 10px var(--accent-glow);
}
.output{
    min-height:220px;
    height: auto;
    border-style: dashed;
}

/* SAYAÇ BİLGİLERİ */
.meta-info {
    font-size: 11px;
    color: var(--text-main);
    margin-bottom: 18px;
    display: flex;
    gap: 18px;
    opacity: 0.7;
    letter-spacing: 0.5px;
}
.meta-info span strong { color: var(--text-heading); }

.action-buttons {
    margin-bottom: 25px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

/* YASAKLI KELİME STİLİ */
.bad-word{
    color:#ff3366;
    font-weight:600;
    background:rgba(255, 51, 102, 0.08);
    border: 1px solid rgba(255, 51, 102, 0.3);
    padding:2px 6px;
    border-radius:4px;
}

/* TOAST BİLDİRİM */
.toast {
    position: fixed;
    top: -100px;
    right: 25px;
    background: var(--bg-container);
    border: 1px solid var(--accent-color);
    color: var(--text-heading);
    padding: 14px 28px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px var(--accent-glow);
    transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 10000;
}
.toast.show { top: 25px; }

/* WATERMARK */
.watermark{
    position:fixed;
    bottom:30px;
    left:0;
    width:100%;
    text-align:center;
    font-size:70px;
    font-weight:900;
    letter-spacing:25px;
    pointer-events:none;
    user-select:none;
    opacity: 0.015; 
    color: var(--text-heading);
    animation: pulse 5s ease-in-out infinite;
}
@keyframes pulse{
    0%,100%{transform:scale(1); opacity: 0.012;}
    50%{transform:scale(1.01); opacity: 0.02;}
}
</style>
</head>

<body>

<!-- GÜNCEL TEMA SEÇİCİ -->
<div class="theme-selector">
    <span class="theme-label">TEMA:</span>
    <div class="theme-dot id-dark-dot active" style="background: #1c1c1e; border: 1px solid #3a3a3c;" onclick="changeTheme('dark', this)" title="Midnight OLED (Derin Siyah)"></div>
    <div class="theme-dot" style="background: #d62828;" onclick="changeTheme('crimson', this)" title="Cyber Crimson (Mat Kırmızı)"></div>
    <div class="theme-dot" style="background: #0077b6;" onclick="changeTheme('blue', this)" title="Deep Sapphire (Soylu Mavi)"></div>
    <div class="theme-dot" style="background: #2d6a4f;" onclick="changeTheme('green', this)" title="Emerald Velvet (Zümrüt Yeşil)"></div>
    <div class="theme-dot" style="background: #7209b7;" onclick="changeTheme('purple', this)" title="Amethyst Dusk (Asil Mor)"></div>
    <div class="theme-dot" style="background: #ff4d6d;" onclick="changeTheme('pink', this)" title="Rose Quartz (Mat Pembe)"></div>
    <div class="theme-dot" style="background: #ffb703;" onclick="changeTheme('yellow', this)" title="Muted Gold (Mat Asil Sarı)"></div>
    <div class="theme-dot" style="background: #e67e22;" onclick="changeTheme('orange', this)" title="Imperial Amber (Kehribar Altın)"></div>
    <div class="theme-dot" style="background: #474d59;" onclick="changeTheme('slate', this)" title="Titanium Slate (Gunmetal Gri)"></div>
    <div class="theme-dot" style="background: #ffffff; border: 1px solid #cbd5e1;" onclick="changeTheme('white', this)" title="Obsidian White (Yumuşak Platin)"></div>
</div>

<div id="toast-notification" class="toast">⚡ METİN BAŞARIYLA KOPYALANDI!</div>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Boşluk Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım Düzenleyici</button>
</div>

<div class="container">

    <!-- TAB 1 -->
    <div class="tab-content active">
        <h3>Metni buraya yapıştır aslan parçası</h3>
        <div id="input1" class="input-area" contenteditable="true" oninput="calculateMeta(1)"></div>
        
        <div class="meta-info">
            <span id="char-count-1">Karakter: <strong>0</strong></span>
            <span id="word-count-1">Kelime: <strong>0</strong></span>
        </div>

        <div class="action-buttons">
            <button onclick="cleanSpaces()">Temizle</button>
            <button onclick="copy1()">Kopyala</button>
            <button onclick="clear1()">Sil</button>
        </div>
        <div id="output1" class="output" contenteditable="true"></div>
    </div>

    <!-- TAB 2 -->
    <div class="tab-content">
        <h3>Metni buraya yapıştır aslan parçası</h3>
        <div id="input2" class="input-area" contenteditable="true" oninput="calculateMeta(2)"></div>

        <div class="meta-info">
            <span id="char-count-2">Karakter: <strong>0</strong></span>
            <span id="word-count-2">Kelime: <strong>0</strong></span>
        </div>

        <div class="action-buttons">
            <button onclick="fixText()">Düzelt</button>
            <button onclick="copy2()">Kopyala</button>
            <button onclick="clear2()">Sil</button>
        </div>
        <div id="output2" class="output" contenteditable="true"></div>
    </div>

</div>

<div class="watermark">TENGRİ</div>

<script>

/* TEMA MOTORU */
function changeTheme(themeName, element) {
    if(themeName === 'dark') {
        document.documentElement.removeAttribute('data-theme');
    } else {
        document.documentElement.setAttribute('data-theme', themeName);
    }
    document.querySelectorAll('.theme-dot').forEach(dot => dot.classList.remove('active'));
    element.classList.add('active');
}

/* BİLDİRİM TOAST */
function showToast() {
    const toast = document.getElementById("toast-notification");
    toast.classList.add("show");
    setTimeout(() => { toast.classList.remove("show"); }, 2000);
}

/* SAYAÇLAR */
function calculateMeta(tabIndex) {
    const text = document.getElementById(`input${tabIndex}`).innerText;
    const charCount = text.length;
    const wordCount = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
    
    document.getElementById(`char-count-${tabIndex}`).innerHTML = `Karakter: <strong>${charCount}</strong>`;
    document.getElementById(`word-count-${tabIndex}`).innerHTML = `Kelime: <strong>${wordCount}</strong>`;
}

/* TAB GEÇİŞLERI */
function openTab(i){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".tab-content")[i].classList.add("active");
    document.querySelectorAll(".tab-btn")[i].classList.add("active");
}

/* YASAKLI KELİMELER */
const bannedWords = [
    "yüksek kalite", "yüksek kaliteli", "hakiki deri", "gerçek deri", "%100 deri", "% 100 deri",
    "birinci sınıf", "1. kalite", "1. sınıf", "unisex", "1.sınıf", "1.kalite", "1.kalıte",
    "1. kalıte", "1.SINIF", "1. SINIF", "1.KALİTE", "1. KALİTE", "BİRİNCİ SINIF", "YÜKSEK KALİTE", "YÜKSEK KALITE"
];

function escapeRegExp(str){ return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function highlight(text) {
    bannedWords.forEach(word => {
        const pattern = escapeRegExp(word).replace(/\s+/g,"\\s+");
        const reg = new RegExp(pattern,"gi");
        text = text.replace(reg, m => `<span class="bad-word">${m}</span>`);
    });
    return text;
}

function cleanGarbageFromText(txt, forceLowercase = false) {
    if (!txt) return "";
    let clean = txt
        .replace(/&nbsp;/gi, " ")
        .replace(/nbsp;/gi, " ")
        .replace(/;nbsp/gi, " ")
        .replace(/&nbsp/gi, " ")
        .replace(/\u00A0/g, " ")
        .replace(/&amp;;/gi, " ")
        .replace(/&amp;/gi, " ")
        .replace(/&[^;]+;/g, " ")
        .replace(/&/g, " ")
        .replace(/;/g, " ");

    clean = clean.replace(/[ \t]+/g, " ");

    if (forceLowercase) {
        clean = clean.toLowerCase();
        clean = clean.replace(/(^|[.!?]\s+)([a-zçğıöşü])/g, (m, p1, p2) => p1 + p2.toUpperCase());
    }
    return clean;
}

function cleanAndStructureDOM(htmlText, forceLowercase = false) {
    if (!htmlText.trim()) return "";
    let sandbox = document.createElement("div");
    sandbox.innerHTML = htmlText;
    
    function traverseAndClean(node) {
        if (node.nodeType === Node.TEXT_NODE) {
            node.textContent = cleanGarbageFromText(node.textContent, forceLowercase);
        } else {
            for (let i = 0; i < node.childNodes.length; i++) {
                traverseAndClean(node.childNodes[i]);
            }
        }
    }
    traverseAndClean(sandbox);
    
    let structuralHTML = sandbox.innerHTML
        .replace(/<(div|p|br)[^>]*>/gi, "\n")
        .replace(/<\/(div|p)>/gi, "");
        
    let lines = structuralHTML.split("\n");
    let finalLines = [];
    
    lines.forEach(line => {
        let trimmedLine = line.trim();
        if (trimmedLine !== "" && trimmedLine !== "<br>" && trimmedLine !== "<b></b>" && trimmedLine !== "<strong></strong>") {
            trimmedLine = trimmedLine.replace(/>\s+</g, "><").replace(/[ \t]+/g, " ");
            finalLines.push(trimmedLine);
        }
    });
    return highlight(finalLines.join("<br>"));
}

function copyToClipboard(elementId) {
    const element = document.getElementById(elementId);
    const clone = element.cloneNode(true);
    clone.querySelectorAll('.bad-word').forEach(el => {
        const textNode = document.createTextNode(el.innerText);
        el.parentNode.replaceChild(textNode, el);
    });
    let finalFormattedHTML = `<span style="font-size: 14px; font-family: sans-serif; line-height: 1.6;">${clone.innerHTML}</span>`;
    const blob = new Blob([finalFormattedHTML], { type: 'text/html' });
    const textBlob = new Blob([clone.innerText], { type: 'text/plain' });
    const data = [new ClipboardItem({ 'text/html': blob, 'text/plain': textBlob })];
    navigator.clipboard.write(data).then(() => { showToast(); });
}

function cleanSpaces(){
    let html = document.getElementById("input1").innerHTML;
    document.getElementById("output1").innerHTML = cleanAndStructureDOM(html, false);
}

document.getElementById("input1").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        document.execCommand('insertLineBreak', false, null);
        e.preventDefault();
    }
});
document.getElementById("input2").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        document.execCommand('insertLineBreak', false, null);
        e.preventDefault();
    }
});

function copy1(){ copyToClipboard("output1"); }
function clear1(){
    document.getElementById("input1").innerHTML="";
    document.getElementById("output1").innerHTML="";
    calculateMeta(1);
}

function fixText(){
    let html = document.getElementById("input2").innerHTML;
    document.getElementById("output2").innerHTML = cleanAndStructureDOM(html, true);
}

function copy2(){ copyToClipboard("output2"); }
function clear2(){
    document.getElementById("input2").innerHTML="";
    document.getElementById("output2").innerHTML="";
    calculateMeta(2);
}

/* 🎯 OTOMATİK DERİN SİYAH (MIDNIGHT OLED) BAŞLANGIÇ TETİKLEYİCİSİ */
window.addEventListener("DOMContentLoaded", function() {
    const darkDot = document.querySelector(".id-dark-dot");
    if (darkDot) {
        changeTheme('dark', darkDot);
    }
});
</script>

</body>
</html>
