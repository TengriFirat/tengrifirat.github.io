<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri Panel</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    background:
        radial-gradient(circle at top, #0b1220, #05070d);
    color:#e8e8e8;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

/* ⚔️ taş hissi */
.container, textarea, .output{
    border-radius:6px;
}

/* TAB */
.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

.tab-btn{
    background:#0a0a0a;
    color:#d6c28a;
    border:1px solid #2b2b2b;
    padding:10px 16px;
    border-radius:6px;
    cursor:pointer;
    transition:.3s;
}

.tab-btn.active{
    border-color:#d6c28a;
    transform:scale(1.05);
    box-shadow:0 0 12px rgba(214,194,138,0.4);
}

.container{
    position:relative;
    width:100%;
}

.tab-content{
    position:absolute;
    width:100%;
    opacity:0;
    transform:translateY(15px);
    transition:.4s;
    pointer-events:none;
}

.tab-content.active{
    opacity:1;
    transform:translateY(0);
    position:relative;
    pointer-events:auto;
}

/* textarea - taş yüzey */
textarea{
    width:100%;
    height:180px;
    background:
        linear-gradient(145deg,#0e0e0e,#141414);
    color:#e6e6e6;
    border:1px solid #3a3a3a;
    padding:12px;
}

/* output */
.output{
    width:100%;
    min-height:180px;
    background:
        linear-gradient(145deg,#0e0e0e,#101010);
    border:1px solid #3a3a3a;
    padding:12px;
    white-space:pre-wrap;
}

/* butonlar */
button{
    background:#0a0a0a;
    color:#d6c28a;
    border:1px solid #2b2b2b;
    padding:10px 14px;
    margin-right:10px;
    border-radius:6px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    border-color:#d6c28a;
    box-shadow:0 0 10px rgba(214,194,138,0.3);
}

/* ❌ yasaklı kelime */
.bad-word{
    color:#ff4a4a;
    font-weight:800;
    background:rgba(255,0,0,0.08);
    padding:2px 4px;
    border-radius:4px;
}

/* ⚔️ ORHUN / TAŞ OYMA TENGRİ */
.watermark{
    position:fixed;
    bottom:20px;
    left:0;
    width:100%;
    text-align:center;
    font-size:58px;
    font-weight:900;
    letter-spacing:14px;
    pointer-events:none;
    user-select:none;

    /* taş içine oyulmuş altın yazı */
    color:#c8b37a;
    text-shadow:
        0 1px 0 #000,
        0 -1px 0 #000,
        2px 2px 6px rgba(0,0,0,0.8),
        0 0 18px rgba(214,194,138,0.25);

    /* hafif “kazıma titreşimi” */
    animation: stoneGlow 4s ease-in-out infinite;
}

/* eski taş parıltısı */
@keyframes stoneGlow{
    0%,100%{filter:brightness(1);}
    50%{filter:brightness(1.25);}
}

/* 🐺 BOZKURT hissi (arka plan sembol) */
body::before{
    content:"🐺";
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:260px;
    opacity:0.03;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Boşluk Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım Düzenleyici</button>
</div>

<div class="container">

    <div class="tab-content active">
        <textarea id="input1"></textarea>
        <button onclick="cleanSpaces()">Temizle</button>
        <button onclick="copy1()">Kopyala</button>
        <button onclick="clear1()">Sil</button>
        <div id="output1" class="output"></div>
    </div>

    <div class="tab-content">
        <textarea id="input2"></textarea>
        <button onclick="fixText()">Düzelt</button>
        <button onclick="copy2()">Kopyala</button>
        <button onclick="clear2()">Sil</button>
        <div id="output2" class="output"></div>
    </div>

</div>

<div class="watermark">⚔ TENGRİ ⚔</div>

<script>
function openTab(i){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));

    document.querySelectorAll(".tab-content")[i].classList.add("active");
    document.querySelectorAll(".tab-btn")[i].classList.add("active");
}

const bannedWords = [
    "yüksek kalite","yüksek kaliteli","hakiki deri","gerçek deri",
    "%100 deri","birinci sınıf","1. kalite","unisex"
];

function escapeRegExp(str){
    return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}

function highlight(text){
    bannedWords.forEach(word=>{
        const pattern = escapeRegExp(word).replace(/\s+/g,"\\s+");
        const reg = new RegExp(pattern,"gi");
        text = text.replace(reg,m=>`<span class="bad-word">${m}</span>`);
    });
    return text;
}

/* TAB 1 */
function cleanSpaces(){
    let t = document.getElementById("input1").value;

    t = t.replace(/\u00A0/g," ")
         .split("\n")
         .map(l=>l.replace(/\s+/g," ").trim())
         .filter(Boolean)
         .join("\n");

    document.getElementById("output1").innerHTML = highlight(t);
}

function copy1(){
    navigator.clipboard.writeText(document.getElementById("output1").innerText);
}

function clear1(){
    document.getElementById("input1").value="";
    document.getElementById("output1").innerHTML="";
}

/* TAB 2 */
function fixText(){
    let text = document.getElementById("input2").value;

    text = text.replace(/\u00A0/g," ").toLowerCase();

    let lines = text.split("\n").map(l=>{
        l=l.trim();
        if(!l) return "";
        return highlight(l.charAt(0).toUpperCase()+l.slice(1));
    }).filter(Boolean);

    document.getElementById("output2").innerHTML = lines.join("<br>");
}

function copy2(){
    navigator.clipboard.writeText(document.getElementById("output2").innerText);
}

function clear2(){
    document.getElementById("input2").value="";
    document.getElementById("output2").innerHTML="";
}
</script>

</body>
</html>
