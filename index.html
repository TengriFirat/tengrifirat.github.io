<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri Panel</title>

<style>
*{box-sizing:border-box;}

/* 🐱 SEVİMLİ KEDİ İMLECİ 🐱 */
html, body, .input-area, input, div {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>🐱</text></svg>"), auto !important;
}

button, .tab-btn {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>🐱</text></svg>"), pointer !important;
}

body{
    margin:0;
    padding:20px;
    background: #020204; 
    color:#94a3b8;
    font-family:'Courier New', Courier, monospace; 
    overflow-x:hidden;
    min-height: 100vh;
}

/* TABS CONTAINER */
.tabs{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:30px;
}

/* DARK VE EPİK BUTONLAR */
button, .tab-btn {
    background: #0a0a0c;
    color: #64748b;
    border: 1px solid #27272a;
    padding: 12px 24px;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 4px;
    transition: all 0.2s ease;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
}

button:hover, .tab-btn:hover {
    color: #fff;
    background: #111115;
    border-color: #ef4444; 
    box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
}

/* AKTİF TAB */
.tab-btn.active {
    background: #18181b;
    color: #ef4444;
    border-color: #ef4444;
    box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
}

/* İÇERİK ALANI */
.container{
    position:relative;
    width:100%;
    max-width: 900px;
    margin: 0 auto;
}

.tab-content{
    position:absolute;
    width:100%;
    opacity:0;
    transform:scale(0.98);
    transition: all .3s ease-in-out;
    pointer-events:none;
    background: #070709;
    padding: 25px;
    border-radius: 6px;
    border: 1px solid #18181b;
}

.tab-content.active{
    opacity:1;
    transform:scale(1);
    position:relative;
    pointer-events:auto;
}

h3 {
    color: #f4f4f5;
    font-size: 15px;
    margin-top: 0;
    margin-bottom: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-left: 3px solid #ef4444;
    padding-left: 10px;
}

/* ZENGİN METİN GİRİŞ VE ÇIKIŞ ALANLARI */
.input-area, .output{
    width:100%;
    height:220px;
    background:#030303;
    color:#e4e4e7;
    border: 1px solid #27272a;
    padding:14px;
    font-size: 14px;
    line-height: 1.6;
    border-radius: 4px;
    outline: none;
    transition: all 0.3s;
    margin-bottom: 5px;
    overflow-y: auto;
    word-break: break-word;
}

.input-area:focus, .output:focus {
    border-color: #ef4444;
    background: #050507;
}

.output{
    min-height:220px;
    height: auto;
    border-style: dashed;
}

/* METİN BİLGİSİ */
.meta-info {
    font-size: 11px;
    color: #4b5563;
    margin-bottom: 15px;
    display: flex;
    gap: 15px;
}
.meta-info span strong {
    color: #86efac;
}

.action-buttons {
    margin-bottom: 25px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

/* SİBER KIRMIZI YASAKLI KELİME */
.bad-word{
    color:#ff0000;
    font-weight:bold;
    background:rgba(255, 0, 0, 0.1);
    border: 1px solid rgba(255, 0, 0, 0.4);
    padding:1px 4px;
    border-radius:2px;
}

/* NEON BİLDİRİM TOAST */
.toast {
    position: fixed;
    top: -100px;
    right: 20px;
    background: #070709;
    border: 1px solid #ef4444;
    color: #fff;
    padding: 12px 24px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: bold;
    box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
    transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 10000;
}
.toast.show {
    top: 20px;
}

/* WATERMARK */
.watermark{
    position:fixed;
    bottom:30px;
    left:0;
    width:100%;
    text-align:center;
    font-size:60px;
    font-weight:900;
    letter-spacing:20px;
    pointer-events:none;
    user-select:none;
    opacity: 0.03; 
    color: #fff;
    animation: pulse 4s ease-in-out infinite;
}

@keyframes pulse{
    0%,100%{transform:scale(1); opacity: 0.02;}
    50%{transform:scale(1.02); opacity: 0.05;}
}
</style>
</head>

<body>

<div id="toast-notification" class="toast">⚔️ METİN KOPYALANDI!</div>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Boşluk Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım Düzenleyici</button>
</div>

<div class="container">

    <div class="tab-content active">
        <h3>Metni buraya yapıştır aslan parçası</h3>
        <div id="input1" class="input-area" contenteditable="true" oninput="calculateMeta(1)"></div>
        
        <div class="meta-info">
            <span id="char-count-1">Karakter: <strong>0</strong></span>
            <span id="word-count-1">Kelime: <strong>0</strong></span>
        </div>

        <div class="action-buttons">
            <button onclick="cleanSpaces()">Temizle</button>
            <button onclick="makeUppercase(1)">Aaa -> AAA</button>
            <button onclick="makeLowercase(1)">AAA -> aaa</button>
            <button onclick="copy1()">Kopyala</button>
            <button onclick="clear1()">Sil</button>
        </div>
        <div id="output1" class="output" contenteditable="true"></div>
    </div>

    <div class="tab-content">
        <h3>Metni buraya yapıştır aslan parçası</h3>
        <div id="input2" class="input-area" contenteditable="true" oninput="calculateMeta(2)"></div>

        <div class="meta-info">
            <span id="char-count-2">Karakter: <strong>0</strong></span>
            <span id="word-count-2">Kelime: <strong>0</strong></span>
        </div>

        <div class="action-buttons">
            <button onclick="fixText()">Düzelt</button>
            <button onclick="makeUppercase(2)">Aaa -> AAA</button>
            <button onclick="makeLowercase(2)">AAA -> aaa</button>
            <button onclick="copy2()">Kopyala</button>
            <button onclick="clear2()">Sil</button>
        </div>
        <div id="output2" class="output" contenteditable="true"></div>
    </div>

</div>

<div class="watermark">TENGRİ</div>

<script>

/* BİLDİRİM TOAST */
function showToast() {
    const toast = document.getElementById("toast-notification");
    toast.classList.add("show");
    setTimeout(() => { toast.classList.remove("show"); }, 2000);
}

/* SAYAÇLAR */
function calculateMeta(tabIndex) {
    const text = document.getElementById(`input${tabIndex}`).innerText;
    const charCount = text.length;
    const wordCount = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
    
    document.getElementById(`char-count-${tabIndex}`).innerHTML = `Karakter: <strong>${charCount}</strong>`;
    document.getElementById(`word-count-${tabIndex}`).innerHTML = `Kelime: <strong>${wordCount}</strong>`;
}

/* HARF DÖNÜŞTÜRÜCÜLER */
function makeUppercase(tabIndex) {
    const inputArea = document.getElementById(`input${tabIndex}`);
    inputArea.innerHTML = inputArea.innerHTML.toLocaleUpperCase('tr-TR');
    calculateMeta(tabIndex);
    if(tabIndex === 1) cleanSpaces(); else fixText();
}

function makeLowercase(tabIndex) {
    const inputArea = document.getElementById(`input${tabIndex}`);
    inputArea.innerHTML = inputArea.innerHTML.toLocaleLowerCase('tr-TR');
    calculateMeta(tabIndex);
    if(tabIndex === 1) cleanSpaces(); else fixText();
}

/* TAB GEÇİŞLERİ */
function openTab(i){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".tab-content")[i].classList.add("active");
    document.querySelectorAll(".tab-btn")[i].classList.add("active");
}

/* YASAKLI KELİMELER */
const bannedWords = [
    "yüksek kalite", "yüksek kaliteli", "hakiki deri", "gerçek deri", "%100 deri", "% 100 deri",
    "birinci sınıf", "1. kalite", "1. sınıf", "unisex", "1.sınıf", "1.kalite", "1.kalıte",
    "1. kalıte", "1.SINIF", "1. SINIF", "1.KALİTE", "1. KALİTE", "BİRİNCİ SINIF", "YÜKSEK KALİTE", "YÜKSEK KALITE"
];

function escapeRegExp(str){ return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function highlight(text){
    bannedWords.forEach(word=>{
        const pattern = escapeRegExp(word).replace(/\s+/g,"\\s+");
        const reg = new RegExp(pattern,"gi");
        text = text.replace(reg, m => `<span class="bad-word">${m}</span>`);
    });
    return text;
}

/* 🧼 BOMBA GİBİ TEMİZLİK MOTORU (NBSP VE &; KALINTILARINI YOK EDER) 🧼 */
function atomizeGarbageCodes(html) {
    return html
        // Tüm türevleriyle bozuk boşluk kodlarını ve tarayıcıların uydurduğu kaçışları temizle
        .replace(/&nbsp;/gi, " ")
        .replace(/nbsp;/gi, " ")
        .replace(/;nbsp/gi, " ")
        .replace(/&nbsp/gi, " ")
        .replace(/\u00A0/g, " ")
        .replace(/&amp;;/gi, " ")
        .replace(/&amp;/gi, " ")
        .replace(/&[^;]+;/g, " ") // Kalan diğer tüm &...; biçimindeki HTML entity yapılarını uçurur
        .replace(/&/g, " ")
        .replace(/;/g, " ")
        // Yapısal etiketleri düzgün satırlara kırp
        .replace(/<\/p>|<br>|<\/div>/gi, "\n")
        .replace(/<p>|<div[^>]*>/gi, "");
}

function cleanAndStructureDOM(htmlText, forceLowercase = false) {
    // Önce tüm çöp kodları atomlarına ayırıp eritiyoruz
    let cleanHTML = atomizeGarbageCodes(htmlText);
    
    let sandbox = document.createElement("div");
    sandbox.innerHTML = cleanHTML;
    
    // Temizlenen metinden satır mimarisini oluştur
    let rawLines = sandbox.innerText.split("\n");
    let processedLines = [];
    
    rawLines.forEach(line => {
        let cleanLine = line.replace(/[ \t]+/g, " ").trim();
        if (cleanLine.length > 0) {
            if (forceLowercase) {
                cleanLine = cleanLine.toLowerCase();
                cleanLine = cleanLine.replace(/(^|[.!?]\s+)([a-zçğıöşü])/g, (m, p1, p2) => p1 + p2.toUpperCase());
            }
            processedLines.push(cleanLine);
        }
    });
    
    // Kalın (`<b>`) karakter bütünlüğünü korumak için iç hiyerarşiyi jilet gibi temizle
    let finalContainer = document.createElement("div");
    finalContainer.innerHTML = htmlText;
    
    // Buradaki HTML temizliğini de ham koda uygulayalım
    let doubleCleanedHTML = finalContainer.innerHTML
        .replace(/&nbsp;/gi, " ")
        .replace(/nbsp;/gi, " ")
        .replace(/;nbsp/gi, " ")
        .replace(/&nbsp/gi, " ")
        .replace(/\u00A0/g, " ")
        .replace(/&amp;;/gi, " ")
        .replace(/&amp;/gi, " ")
        .replace(/&/g, " ")
        .replace(/;/g, " ");
        
    finalContainer.innerHTML = doubleCleanedHTML;

    function cleanNodes(node) {
        if (node.nodeType === Node.TEXT_NODE) {
            let txt = node.textContent.replace(/[ \t]+/g, " ");
            if (forceLowercase) {
                txt = txt.toLowerCase().replace(/(^|[.!?]\s+)([a-zçğıöşü])/g, (m, p1, p2) => p1 + p2.toUpperCase());
            }
            node.textContent = txt;
        } else {
            for (let i = 0; i < node.childNodes.length; i++) {
                cleanNodes(node.childNodes[i]);
            }
        }
    }
    cleanNodes(finalContainer);
    
    // Satırları ayır ve nizami <br> kırılımlı hale getir
    let finalHTML = finalContainer.innerHTML
        .replace(/<(div|p|br)[^>]*>/gi, "\n")
        .replace(/<\/(div|p)>/gi, "")
        .split("\n")
        .map(l => l.replace(/[ \t]+/g, " ").trim())
        .filter(l => l.length > 0)
        .join("<br>");
        
    return highlight(finalHTML);
}

/* KOPYALAYICI */
function copyToClipboard(elementId) {
    const element = document.getElementById(elementId);
    const clone = element.cloneNode(true);
    clone.querySelectorAll('.bad-word').forEach(el => {
        const textNode = document.createTextNode(el.innerText);
        el.parentNode.replaceChild(textNode, el);
    });

    const blob = new Blob([clone.innerHTML], { type: 'text/html' });
    const textBlob = new Blob([clone.innerText], { type: 'text/plain' });
    const data = [new ClipboardItem({ 'text/html': blob, 'text/plain': textBlob })];
    
    navigator.clipboard.write(data).then(() => { showToast(); });
}

/* TAB 1 - BOŞLUK TEMİZLEME */
function cleanSpaces(){
    let html = document.getElementById("input1").innerHTML;
    document.getElementById("output1").innerHTML = cleanAndStructureDOM(html, false);
}

function copy1(){ copyToClipboard("output1"); }
function clear1(){
    document.getElementById("input1").innerHTML="";
    document.getElementById("output1").innerHTML="";
    calculateMeta(1);
}

/* TAB 2 - YAZIM DÜZENLEME */
function fixText(){
    let html = document.getElementById("input2").innerHTML;
    document.getElementById("output2").innerHTML = cleanAndStructureDOM(html, true);
}

function copy2(){ copyToClipboard("output2"); }
function clear2(){
    document.getElementById("input2").innerHTML="";
    document.getElementById("output2").innerHTML="";
    calculateMeta(2);
}

</script>

</body>
</html>
