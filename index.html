<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Metin Temizleyici</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

textarea {
    width: 100%;
    height: 200px;
    font-size: 14px;
}

#output {
    margin-top: 20px;
    padding: 10px;
    background: #f4f4f4;
    white-space: pre-wrap;
    min-height: 100px;
}
</style>
</head>

<body>

<h2>Metin Yapıştır</h2>

<textarea id="input" placeholder="Metni buraya yapıştır..."></textarea>

<h3>Sonuç</h3>
<div id="output"></div>

<script>
function cleanAndHighlight(text) {
    const map = new Map();

    // HTML strong / bold koru
    text = text.replace(/<(strong|b)>.*?<\/(strong|b)>/gi, m => {
        const k = "__STRONG_" + map.size + "__";
        map.set(k, m);
        return k;
    });

    // HTML em / italic koru
    text = text.replace(/<(em|i)>.*?<\/(em|i)>/gi, m => {
        const k = "__EM_" + map.size + "__";
        map.set(k, m);
        return k;
    });

    // NBSP temizle
    text = text.replace(/\u00A0/g, " ");

    // boşluk normalize
    text = text.replace(/\s+/g, " ").trim();

    // kırmızı yapılacak kelimeler
    const keywords = [
        "yüksek kaliteli",
        "hakiki deri",
        "unisex",
        "birinci sınıf",
        "1. kalite",
        "1 . kalite",
        "1. sınıf",
        "1 . sınıf"
    ];

    keywords.forEach(word => {
        const regex = new RegExp(
            "\\b" + word.replace(/\./g, "\\.").replace(/ /g, "\\s*") + "\\b",
            "gi"
        );

        text = text.replace(regex, match => {
            return `<span style="color:red; font-weight:bold;">${match}</span>`;
        });
    });

    // geri yükle
    map.forEach((v, k) => {
        text = text.replace(k, v);
    });

    return text;
}

// input dinleme
document.getElementById("input").addEventListener("input", async function () {
    const result = cleanAndHighlight(this.value);

    document.getElementById("output").innerHTML = result;

    // otomatik kopyala
    try {
        await navigator.clipboard.writeText(result);
    } catch (e) {}
});
</script>

</body>
</html>
