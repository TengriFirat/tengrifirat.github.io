<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri Panel</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    background:#050b17;
    color:white;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

.tab-btn{
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px 16px;
    border-radius:6px;
    cursor:pointer;
}

.tab-btn.active{
    border-color:#ffb300;
    transform:scale(1.05);
}

.container{
    position:relative;
    width:100%;
}

.tab-content{
    position:absolute;
    width:100%;
    opacity:0;
    transform:translateX(30px);
    transition:.4s;
    pointer-events:none;
}

.tab-content.active{
    opacity:1;
    transform:translateX(0);
    position:relative;
    pointer-events:auto;
}

textarea{
    width:100%;
    height:180px;
    background:#0d1628;
    color:white;
    border:1px solid #23324d;
    padding:12px;
}

.output{
    width:100%;
    min-height:180px;
    background:#0d1628;
    border:1px solid #23324d;
    padding:12px;
    white-space:pre-wrap;
}

button{
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px 14px;
    margin-right:10px;
    border-radius:6px;
    cursor:pointer;
}

.bad-word{
    color:#ff2b2b;
    font-weight:800;
    background:rgba(255,0,0,0.12);
    padding:2px 4px;
    border-radius:4px;
}

canvas{
    width:100%;
    height:400px;
    background:#0d1628;
    border:1px solid #23324d;
}
</style>

</head>

<body>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Boşluk Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım Düzenleyici</button>
    <button class="tab-btn" onclick="openTab(2)">🎈 Balon Oyunu</button>
</div>

<div class="container">

<!-- TAB 1 -->
<div class="tab-content active">
<h3>Boşluk Temizleyici</h3>
<textarea id="input1"></textarea>
<button onclick="cleanSpaces()">Temizle</button>
<button onclick="copy1()">Kopyala</button>
<button onclick="clear1()">Sil</button>
<div id="output1" class="output"></div>
</div>

<!-- TAB 2 -->
<div class="tab-content">
<h3>Yazım Düzenleyici</h3>
<textarea id="input2"></textarea>
<button onclick="fixText()">Düzelt</button>
<button onclick="copy2()">Kopyala</button>
<button onclick="clear2()">Sil</button>
<div id="output2" class="output"></div>
</div>

<!-- TAB 3 - OYUN -->
<div class="tab-content">
<h3>🎈 Balon Patlatma Oyunu</h3>

<button onclick="startGame()">Başlat</button>
<button onclick="resetGame()">Sıfırla</button>
<span>Puan: <b id="score">0</b></span>

<canvas id="gameCanvas"></canvas>
</div>

</div>

<script>

/* TAB */
function openTab(i){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));

    document.querySelectorAll(".tab-content")[i].classList.add("active");
    document.querySelectorAll(".tab-btn")[i].classList.add("active");
}

/* METİN SİSTEMİ */
const bannedWords = ["yüksek kalite","hakiki deri","unisex"];

function highlight(text){
    bannedWords.forEach(w=>{
        let r = new RegExp(w,"gi");
        text = text.replace(r, m=>`<span class="bad-word">${m}</span>`);
    });
    return text;
}

function cleanSpaces(){
    let t = document.getElementById("input1").value;
    t = t.replace(/\s+/g," ").trim();
    document.getElementById("output1").innerHTML = highlight(t);
}

function fixText(){
    let t = document.getElementById("input2").value;
    t = t.toLowerCase();
    t = t.charAt(0).toUpperCase() + t.slice(1);
    document.getElementById("output2").innerHTML = highlight(t);
}

function copy1(){navigator.clipboard.writeText(document.getElementById("output1").innerText);}
function copy2(){navigator.clipboard.writeText(document.getElementById("output2").innerText);}
function clear1(){input1.value="";output1.innerHTML="";}
function clear2(){input2.value="";output2.innerHTML="";}

/* 🎮 BALON OYUNU */
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

let balloons = [];
let score = 0;
let gameRunning = false;

const colors = ["red","blue","green","yellow","purple","orange"];

function resize(){
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}

function createBalloon(){
    return {
        x: Math.random()*canvas.width,
        y: canvas.height+50,
        r: 20+Math.random()*15,
        speed: 1+Math.random()*2,
        color: colors[Math.floor(Math.random()*colors.length)]
    };
}

function draw(b){
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle=b.color;
    ctx.fill();
}

function loop(){
    if(!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(Math.random()<0.03){
        balloons.push(createBalloon());
    }

    balloons.forEach((b,i)=>{
        b.y -= b.speed;
        draw(b);
        if(b.y<-50) balloons.splice(i,1);
    });

    requestAnimationFrame(loop);
}

function startGame(){
    resize();
    gameRunning = true;
    loop();
}

function resetGame(){
    balloons=[];
    score=0;
    document.getElementById("score").innerText=0;
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

canvas.addEventListener("click",e=>{
    let r = canvas.getBoundingClientRect();
    let mx = e.clientX-r.left;
    let my = e.clientY-r.top;

    balloons.forEach((b,i)=>{
        let dx=mx-b.x, dy=my-b.y;
        if(Math.sqrt(dx*dx+dy*dy)<b.r){
            balloons.splice(i,1);
            score++;
            document.getElementById("score").innerText=score;
        }
    });
});

</script>

</body>
</html>
