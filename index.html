<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri Panel</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    background:#050b17;
    color:white;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

/* ===================== */
/* TAB BAR */
/* ===================== */

.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

.tab-btn{
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px 16px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

.tab-btn.active{
    border-color:#ffb300;
    transform:scale(1.05);
}

/* ===================== */
/* TAB ANİMASYON */
/* ===================== */

.container{
    position:relative;
    width:100%;
    overflow:hidden;
}

.tab-content{
    position:absolute;
    width:100%;
    opacity:0;
    transform:translateX(30px);
    transition:all .4s ease;
    pointer-events:none;
}

.tab-content.active{
    opacity:1;
    transform:translateX(0);
    position:relative;
    pointer-events:auto;
}

/* ===================== */
/* INPUT / OUTPUT */
/* ===================== */

textarea{
    width:100%;
    height:180px;
    background:#0d1628;
    color:white;
    border:1px solid #23324d;
    padding:12px;
    margin-bottom:10px;
}

.output{
    width:100%;
    min-height:180px;
    background:#0d1628;
    border:1px solid #23324d;
    padding:12px;
    white-space:pre-wrap;
    outline:none;
}

/* BUTTONS */
button{
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px 14px;
    margin-right:10px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1a1a1a;
}

/* ===================== */
/* TENGRİ ALT LOGO */
/* ===================== */

.watermark{
    position:fixed;
    bottom:15px;
    left:0;
    width:100%;
    text-align:center;
    font-size:46px;
    font-weight:900;
    letter-spacing:10px;
    pointer-events:none;
    user-select:none;

    background:linear-gradient(90deg,#ffb300,#ff5500,#fff,#ff5500,#ffb300);
    background-size:300% 100%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation: glow 4s linear infinite, pulse 2s ease-in-out infinite;
}

@keyframes glow{
    0%{background-position:0%;}
    100%{background-position:300%;}
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
}
</style>
</head>

<body>

<!-- TAB BUTTONS -->
<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Boşluk Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım Düzenleyici</button>
</div>

<div class="container">

<!-- TAB 1 -->
<div class="tab-content active">

<h3>Metni buraya yapıştır aslan parçası</h3>

<textarea id="input1"></textarea>

<div>
    <button onclick="cleanSpaces()">Temizle</button>
    <button onclick="copy1()">Kopyala</button>
    <button onclick="clear1()">Sil</button>
</div>

<div id="output1" class="output" contenteditable="true"></div>

</div>

<!-- TAB 2 -->
<div class="tab-content">

<h3>Metni buraya yapıştır aslan parçası</h3>

<textarea id="input2"></textarea>

<div>
    <button onclick="fixText()">Düzelt</button>
    <button onclick="copy2()">Kopyala</button>
    <button onclick="clear2()">Sil</button>
</div>

<div id="output2" class="output" contenteditable="true"></div>

</div>

</div>

<!-- 🔥 TENGRİ -->
<div class="watermark">⚔️ TENGRİ ⚔️</div>

<script>

/* TAB SYSTEM */
function openTab(i){

    const tabs = document.querySelectorAll(".tab-content");
    const btns = document.querySelectorAll(".tab-btn");

    tabs.forEach(t=>t.classList.remove("active"));
    btns.forEach(b=>b.classList.remove("active"));

    tabs[i].classList.add("active");
    btns[i].classList.add("active");
}

/* TAB 1 */
function cleanSpaces(){
    let t = document.getElementById("input1").value;

    t = t.replace(/&nbsp;/gi," ")
         .replace(/\u00A0/g," ")
         .replace(/\s+/g," ")
         .trim();

    document.getElementById("output1").innerText = t;
}

function copy1(){
    navigator.clipboard.writeText(document.getElementById("output1").innerText);
}

function clear1(){
    document.getElementById("input1").value="";
    document.getElementById("output1").innerText="";
}

/* TAB 2 */
function fixText(){

    let text = document.getElementById("input2").value;

    text = text.replace(/&nbsp;/gi," ")
               .replace(/\u00A0/g," ")
               .replace(/\s+/g," ")
               .trim();

    let sentences = text.split(".");

    sentences = sentences.map(s=>{
        s = s.trim();
        if(!s) return "";

        s = s.toLowerCase();
        s = s.charAt(0).toUpperCase() + s.slice(1);

        return s;
    });

    text = sentences.filter(Boolean).join(". ");

    if(!text.endsWith(".")) text += ".";

    document.getElementById("output2").innerText = text;
}

function copy2(){
    navigator.clipboard.writeText(document.getElementById("output2").innerText);
}

function clear2(){
    document.getElementById("input2").value="";
    document.getElementById("output2").innerText="";
}

</script>

</body>
</html>
