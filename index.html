<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri Panel Premium</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:30px;
    font-family:Arial,sans-serif;
    color:white;
    background: radial-gradient(circle at top, #1a2740, #050b17 60%);
}

/* HEADER */
.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:44px;
    letter-spacing:10px;
    font-weight:900;

    background: linear-gradient(90deg,#ffb300,#ff2d55,#00e5ff,#7c4dff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation: glow 4s linear infinite;
}

@keyframes glow{
    0%{filter:hue-rotate(0deg);}
    100%{filter:hue-rotate(360deg);}
}

/* TABS */
.tabs{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:25px;
}

.tab-btn{
    padding:12px 18px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.tab-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.tab-btn.active{
    border:1px solid #ffb300;
    box-shadow:0 0 18px rgba(255,179,0,0.4);
}

/* CONTENT */
.tab-content{
    display:none;
    animation:fade 0.4s ease;
}

.tab-content.active{
    display:block;
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* CARD */
.card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

/* TEXTAREA */
textarea{
    width:100%;
    height:160px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(0,0,0,0.3);
    color:white;
    padding:12px;
    outline:none;
}

/* OUTPUT */
.output{
    margin-top:10px;
    padding:12px;
    border-radius:12px;
    background:rgba(0,0,0,0.25);
}

/* BUTTON */
button{
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(90deg,#ffb300,#ff2d55);
    color:white;
    margin-right:8px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

/* BAD WORD */
.bad-word{
    color:#ff3b3b;
    font-weight:700;
    background:rgba(255,0,0,0.15);
    padding:2px 5px;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="header">
    <h1>TENGRİ PANEL</h1>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım</button>
</div>

<div class="tab-content active">

<div class="card">
    <h3>Boşluk Temizleyici</h3>
    <textarea id="input1"></textarea>
    <button onclick="cleanSpaces()">Temizle</button>
    <button onclick="copy1()">Kopyala</button>
    <button onclick="clear1()">Sil</button>
    <div id="output1" class="output"></div>
</div>

</div>

<div class="tab-content">

<div class="card">
    <h3>Yazım Düzenleyici</h3>
    <textarea id="input2"></textarea>
    <button onclick="fixText()">Düzelt</button>
    <button onclick="copy2()">Kopyala</button>
    <button onclick="clear2()">Sil</button>
    <div id="output2" class="output"></div>
</div>

</div>

<script>

/* TAB */
function openTab(i){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));

    document.querySelectorAll(".tab-content")[i].classList.add("active");
    document.querySelectorAll(".tab-btn")[i].classList.add("active");
}

/* BAD WORD SYSTEM */
const bannedWords=[
"yüksek kalite","hakiki deri","gerçek deri","unisex"
];

function highlight(text){
    bannedWords.forEach(w=>{
        text=text.replace(new RegExp(w,"gi"),m=>`<span class="bad-word">${m}</span>`);
    });
    return text;
}

/* CLEAN */
function cleanSpaces(){
    let t=input1.value;
    t=t.replace(/\u00A0/g," ")
       .split("\n")
       .map(l=>l.replace(/\s+/g," ").trim())
       .filter(l=>l)
       .join("\n");

    output1.innerHTML=highlight(t);
}

/* FIX */
function fixText(){
    let t=input2.value;

    t=t.replace(/\u00A0/g," ")
       .replace(/\s+/g," ")
       .toLowerCase();

    t=t.charAt(0).toUpperCase()+t.slice(1);

    output2.innerHTML=highlight(t);
}

/* COPY / CLEAR */
function copy1(){navigator.clipboard.writeText(output1.innerText);}
function copy2(){navigator.clipboard.writeText(output2.innerText);}
function clear1(){input1.value="";output1.innerHTML="";}
function clear2(){input2.value="";output2.innerHTML="";}

</script>

</body>
</html>
