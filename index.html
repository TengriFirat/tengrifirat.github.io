<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metin Temizleyici</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    background:#050b17;
    color:white;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

/* ÜST BUTON */
.top-nav{
    text-align:center;
    margin-bottom:20px;
}

.nav-btn{
    display:inline-block;
    background:#000;
    color:#fff;
    text-decoration:none;
    border:1px solid #333;
    padding:10px 18px;
    border-radius:6px;
    font-weight:bold;
}

/* TEXTAREA */
textarea{
    width:100%;
    height:200px;
    background:#0d1628;
    color:white;
    border:1px solid #23324d;
    padding:12px;
    font-size:14px;
    margin-bottom:10px;
}

/* OUTPUT */
#output{
    width:100%;
    min-height:220px;
    background:#0d1628;
    border:1px solid #23324d;
    padding:12px;
    outline:none;
    white-space:pre-wrap;
    position:relative;
    z-index:2;
}

/* BUTTON */
button{
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px 15px;
    margin-right:10px;
    border-radius:6px;
    cursor:pointer;
}

.red{color:#ff4040;font-weight:bold;}

/* ===================== */
/* DAĞ */
/* ===================== */

.mountain{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:220px;
    z-index:0;
    pointer-events:none;
}

.mountain svg path{
    fill:#0a1425;
}

/* ===================== */
/* TENGRİ + KURT (GERÇEK SİLÜET) */
/* ===================== */

.watermark{
    position:fixed;
    bottom:35px;
    left:0;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
    font-size:44px;
    font-weight:900;
    letter-spacing:8px;
    z-index:3;
    pointer-events:none;

    background:linear-gradient(90deg,#ffb300,#ff5500,#fff,#ff5500,#ffb300);
    background-size:300% 100%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation: glow 4s linear infinite, pulse 2s ease-in-out infinite;
}

/* TENGRİ animasyon */
@keyframes glow{
    0%{background-position:0% 50%;}
    100%{background-position:300% 50%;}
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
}

/* KURT */
.wolf{
    width:120px;
    height:70px;
    animation: wolfMove 2.8s ease-in-out infinite;
    filter: drop-shadow(0 0 10px rgba(255,180,0,.6));
}

@keyframes wolfMove{
    0%,100%{transform:translateY(0) scale(1);}
    50%{transform:translateY(-8px) scale(1.05);}
}

.mirror{
    transform:scaleX(-1);
}
</style>
</head>

<body>

<div class="top-nav">
    <a href="https://tengrifirat2.github.io/" class="nav-btn">
        Türkçe Yazım Düzenleyici
    </a>
</div>

<h2>Metni yapıştır</h2>

<textarea id="input"></textarea>

<div>
    <button onclick="cleanText()">Temizle</button>
    <button onclick="copyText()">Kopyala</button>
    <button onclick="clearAll()">Sil</button>
</div>

<div id="output" contenteditable="true"></div>

<!-- DAĞ -->
<div class="mountain">
<svg viewBox="0 0 1000 200" preserveAspectRatio="none">
<path d="M0,200 L120,120 L240,170 L360,90 L480,150 L600,70 L720,140 L840,100 L1000,200 Z"/>
</svg>
</div>

<!-- TENGRİ + GERÇEK KURT SİLÜETİ -->
<div class="watermark">

<!-- SOL KURT -->
<svg class="wolf" viewBox="0 0 200 100">
<path fill="#ffb300" d="M10 70 L25 40 L40 55 L60 20 L80 45 L100 25 L120 50 L140 30 L160 60 L180 45 L190 70 L160 65 L140 80 L120 70 L100 85 L80 70 L60 85 L40 70 Z"/>
</svg>

⚔️ TENGRİ ⚔️

<!-- SAĞ KURT -->
<svg class="wolf mirror" viewBox="0 0 200 100">
<path fill="#ff5500" d="M10 70 L25 40 L40 55 L60 20 L80 45 L100 25 L120 50 L140 30 L160 60 L180 45 L190 70 L160 65 L140 80 L120 70 L100 85 L80 70 L60 85 L40 70 Z"/>
</svg>

</div>

<script>

function cleanText(){

    let text = document.getElementById("input").value;

    text = text.replace(/\u00A0/g," ");

    text = text
        .split("\n")
        .map(l => l.replace(/\s+/g," ").trim())
        .filter(l => l.length>0)
        .join("\n");

    const keywords = [
        "yüksek kaliteli",
        "yüksek kalite",
        "hakiki deri",
        "gerçek deri",
        "unisex",
        "birinci sınıf",
        "1. kalite",
        "1. sınıf",
        "%100 deri"
    ];

    keywords.forEach(word=>{
        const regex = new RegExp(word,"gi");
        text = text.replace(regex, match=>{
            return `<span class="red">${match}</span>`;
        });
    });

    document.getElementById("output").innerHTML = text;
}

function copyText(){
    navigator.clipboard.writeText(document.getElementById("output").innerText);
}

function clearAll(){
    document.getElementById("input").value="";
    document.getElementById("output").innerHTML="";
}

</script>

</body>
</html>
