<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri Metin Panel</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    background:#050b17;
    color:white;
    font-family:Arial,sans-serif;
}

/* ===================== */
/* TAB MENÜ */
/* ===================== */

.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

.tab-btn{
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px 16px;
    cursor:pointer;
    border-radius:6px;
    font-weight:bold;
    transition:.2s;
}

.tab-btn.active{
    background:#1a1a1a;
    border-color:#ffb300;
}

/* ===================== */
/* SECTIONS */
/* ===================== */

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
}

/* TEXTAREA */
textarea{
    width:100%;
    height:180px;
    background:#0d1628;
    color:white;
    border:1px solid #23324d;
    padding:12px;
    margin-bottom:10px;
}

/* OUTPUT */
.output{
    width:100%;
    min-height:180px;
    background:#0d1628;
    border:1px solid #23324d;
    padding:12px;
    outline:none;
    white-space:pre-wrap;
}

/* BUTTONS */
button{
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px 14px;
    margin-right:10px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1a1a1a;
}

/* RED HIGHLIGHT */
.red{
    color:#ff4040;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- TAB BUTTONS -->
<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Boşluk Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım Düzenleyici</button>
</div>

<!-- ===================== -->
<!-- TAB 1 -->
<!-- ===================== -->
<div class="tab-content active">

<h3>Boşluk Temizleyici</h3>

<textarea id="input1"></textarea>

<div>
    <button onclick="cleanSpaces()">Temizle</button>
    <button onclick="copy1()">Kopyala</button>
    <button onclick="clear1()">Sil</button>
</div>

<div id="output1" class="output" contenteditable="true"></div>

</div>

<!-- ===================== -->
<!-- TAB 2 -->
<!-- ===================== -->
<div class="tab-content">

<h3>Türkçe Yazım Düzenleyici</h3>

<textarea id="input2"></textarea>

<div>
    <button onclick="fixText()">Düzelt</button>
    <button onclick="copy2()">Kopyala</button>
    <button onclick="clear2()">Sil</button>
</div>

<div id="output2" class="output" contenteditable="true"></div>

</div>

<script>

/* ===================== */
/* TAB SYSTEM */
/* ===================== */

function openTab(index){

    const tabs = document.querySelectorAll(".tab-content");
    const buttons = document.querySelectorAll(".tab-btn");

    tabs.forEach(t => t.classList.remove("active"));
    buttons.forEach(b => b.classList.remove("active"));

    tabs[index].classList.add("active");
    buttons[index].classList.add("active");
}

/* ===================== */
/* TAB 1 - BOŞLUK TEMİZLEME */
/* ===================== */

function cleanSpaces(){

    let text = document.getElementById("input1").value;

    text = text
        .replace(/&nbsp;/gi," ")
        .replace(/\u00A0/g," ")
        .replace(/\s+/g," ")
        .trim();

    document.getElementById("output1").innerText = text;
}

function copy1(){
    navigator.clipboard.writeText(document.getElementById("output1").innerText);
}

function clear1(){
    document.getElementById("input1").value="";
    document.getElementById("output1").innerText="";
}

/* ===================== */
/* TAB 2 - TÜRKÇE DÜZELTME */
/* ===================== */

function fixText(){

    let text = document.getElementById("input2").value;

    text = text
        .replace(/&nbsp;/gi," ")
        .replace(/\u00A0/g," ")
        .replace(/\s+/g," ")
        .trim();

    let sentences = text.split(".");

    sentences = sentences.map(s=>{
        s = s.trim();
        if(!s) return "";

        s = s.toLowerCase();
        s = s.charAt(0).toUpperCase() + s.slice(1);

        return s;
    });

    text = sentences.filter(Boolean).join(". ");

    if(!text.endsWith(".")){
        text += ".";
    }

    document.getElementById("output2").innerText = text;
}

function copy2(){
    navigator.clipboard.writeText(document.getElementById("output2").innerText);
}

function clear2(){
    document.getElementById("input2").value="";
    document.getElementById("output2").innerText="";
}

</script>

</body>
</html>
