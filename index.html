<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri Panel</title>

<style>
/* ==========================================================================
   TEMA DEĞİŞKENLERİ (CSS VARIABLES) - VARSAYILAN: DARK TEMA
   ========================================================================== */
:root {
    --bg-main: #020204;
    --bg-container: #070709;
    --bg-input: #030303;
    --bg-btn: #0a0a0c;
    --bg-btn-hover: #111115;
    --bg-tab-active: #18181b;
    --text-main: #94a3b8;
    --text-input: #e4e4e7;
    --text-heading: #f4f4f5;
    --text-btn: #64748b;
    --border-color: #27272a;
    --border-container: #18181b;
    --accent-color: #ef4444; 
    --accent-glow: rgba(239, 68, 68, 0.4);
}

/* AÇIK RENK TEMASI */
html[data-theme="white"] {
    --bg-main: #f1f5f9;
    --bg-container: #ffffff;
    --bg-input: #f8fafc;
    --bg-btn: #e2e8f0;
    --bg-btn-hover: #cbd5e1;
    --bg-tab-active: #ffffff;
    --text-main: #475569;
    --text-input: #0f172a;
    --text-heading: #1e293b;
    --text-btn: #64748b;
    --border-color: #cbd5e1;
    --border-container: #e2e8f0;
    --accent-color: #3b82f6; 
    --accent-glow: rgba(59, 130, 246, 0.2);
}

/* KIZLARA ÖZEL PEMBE TEMA */
html[data-theme="pink"] {
    --bg-main: #1c0d16;
    --bg-container: #2d1222;
    --bg-input: #15060f;
    --bg-btn: #3d192f;
    --bg-btn-hover: #4c1d3a;
    --bg-tab-active: #4c1d3a;
    --text-main: #f472b6;
    --text-input: #fdf2f8;
    --text-heading: #fce7f3;
    --text-btn: #f472b6;
    --border-color: #4c1d3a;
    --border-container: #3d192f;
    --accent-color: #ec4899; 
    --accent-glow: rgba(236, 72, 153, 0.4);
}

/* ERKEKLERE ÖZEL MAVİ TEMA */
html[data-theme="blue"] {
    --bg-main: #050b14;
    --bg-container: #0b1528;
    --bg-input: #030710;
    --bg-btn: #0f203c;
    --bg-btn-hover: #172f57;
    --bg-tab-active: #172f57;
    --text-main: #60a5fa;
    --text-input: #eff6ff;
    --text-heading: #dbeafe;
    --text-btn: #3b82f6;
    --border-color: #172f57;
    --border-container: #0f203c;
    --accent-color: #2563eb; 
    --accent-glow: rgba(37, 99, 235, 0.4);
}

/* NEON KIRMIZI TEMA */
html[data-theme="red"] {
    --bg-main: #140505;
    --bg-container: #280b0b;
    --bg-input: #0f0303;
    --bg-btn: #3c0f0f;
    --bg-btn-hover: #571717;
    --bg-tab-active: #571717;
    --text-main: #f87171;
    --text-input: #fef2f2;
    --text-heading: #fee2e2;
    --text-btn: #ef4444;
    --border-color: #571717;
    --border-container: #3c0f0f;
    --accent-color: #dc2626; 
    --accent-glow: rgba(220, 38, 38, 0.5);
}

*{box-sizing:border-box;}

/* 🐱 ÖZEL ÇİZİM TOMBİŞ BEYAZ KEDİ İMLECİ 🐱 */
html, body, .input-area, div {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><circle cx='16' cy='18' r='11' fill='%23ffffff' stroke='%23444' stroke-width='0.5'/><path d='M6 11 L11 7 L12 13 Z' fill='%23ffffff' stroke='%23444' stroke-width='0.5'/><path d='M26 11 L21 7 L20 13 Z' fill='%23ffffff' stroke='%23444' stroke-width='0.5'/><path d='M7 10 L10 8 L11 12 Z' fill='%23ffb6c1'/><path d='M25 10 L22 8 L21 12 Z' fill='%23ffb6c1'/><circle cx='12' cy='16' r='1.5' fill='%23222222'/><circle cx='20' cy='16' r='1.5' fill='%23222222'/><ellipse cx='8' cy='19' rx='2' ry='1' fill='%23ffb6c1' opacity='0.7'/><ellipse cx='24' cy='19' rx='2' ry='1' fill='%23ffb6c1' opacity='0.7'/><polygon points='16,18 14,16 18,16' fill='%23ffb6c1'/><path d='M14 20 Q16 22 18 20' stroke='%23222222' stroke-width='1' fill='none'/></svg>"), auto !important;
}

/* 🐾 ÖZEL ÇİZİM PEMBE YASTIKÇIKLI ŞİRİN PATİ 🐾 */
button, .tab-btn, .theme-dot, .input-area:hover, .output:hover {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><ellipse cx='16' cy='19' rx='8' ry='7' fill='%23ffffff' stroke='%23444' stroke-width='0.5'/><ellipse cx='16' cy='20' rx='5' ry='4' fill='%23ffb6c1'/><circle cx='9' cy='12' r='3.5' fill='%23ffffff' stroke='%23444' stroke-width='0.5'/><circle cx='9' cy='12' r='2' fill='%23ffb6c1'/><circle cx='16' cy='9' r='4' fill='%23ffffff' stroke='%23444' stroke-width='0.5'/><circle cx='16' cy='9' r='2.5' fill='%23ffb6c1'/><circle cx='23' cy='12' r='3.5' fill='%23ffffff' stroke='%23444' stroke-width='0.5'/><circle cx='23' cy='12' r='2' fill='%23ffb6c1'/></svg>"), pointer !important;
}

body{
    margin:0;
    padding:20px;
    background: var(--bg-main) !important; 
    color: var(--text-main) !important;
    font-family:'Courier New', Courier, monospace; 
    overflow-x:hidden;
    min-height: 100vh;
    transition: background 0.25s ease, color 0.25s ease;
}

/* TEMA SEÇİCİ PANEL */
.theme-selector {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    max-width: 900px;
    margin: 0 auto 15px auto;
    align-items: center;
}
.theme-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: bold;
    color: var(--text-btn);
}
.theme-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: all 0.2s;
    box-shadow: 0 0 8px rgba(0,0,0,0.3);
}
.theme-dot:hover {
    transform: scale(1.2);
}
.theme-dot.active {
    border-color: var(--text-heading) !important;
    transform: scale(1.1);
}

/* TABS CONTAINER */
.tabs{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:30px;
}

/* DİNAMİK BUTONLAR */
button, .tab-btn {
    background: var(--bg-btn);
    color: var(--text-btn);
    border: 1px solid var(--border-color);
    padding: 12px 24px;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 4px;
    transition: all 0.2s ease;
}

button:hover, .tab-btn:hover {
    color: var(--text-heading) !important;
    background: var(--bg-btn-hover);
    border-color: var(--accent-color); 
    box-shadow: 0 0 15px var(--accent-glow);
}

/* AKTİF TAB */
.tab-btn.active {
    background: var(--bg-tab-active) !important;
    color: var(--accent-color) !important;
    border-color: var(--accent-color) !important;
    box-shadow: 0 0 20px var(--accent-glow);
}

/* İÇERİK ALANI */
.container{
    position:relative;
    width:100%;
    max-width: 900px;
    margin: 0 auto;
}

.tab-content{
    position:absolute;
    width:100%;
    opacity:0;
    transform:scale(0.98);
    transition: all .25s ease-in-out;
    pointer-events:none;
    background: var(--bg-container);
    padding: 25px;
    border-radius: 6px;
    border: 1px solid var(--border-container);
}

.tab-content.active{
    opacity:1;
    transform:scale(1);
    position:relative;
    pointer-events:auto;
}

h3 {
    color: var(--text-heading);
    font-size: 15px;
    margin-top: 0;
    margin-bottom: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-left: 3px solid var(--accent-color);
    padding-left: 10px;
}

/* ZENGİN METİN GİRİŞ VE ÇIKIŞ ALANLARI */
.input-area, .output{
    width:100%;
    height:220px;
    background: var(--bg-input);
    color: var(--text-input);
    border: 1px solid var(--border-color);
    padding:14px;
    font-size: 14px; 
    line-height: 1.6;
    border-radius: 4px;
    outline: none;
    transition: all 0.2s;
    margin-bottom: 5px;
    overflow-y: auto;
    word-break: break-word;
}

.input-area:focus, .output:focus {
    border-color: var(--accent-color);
}

.output{
    min-height:220px;
    height: auto;
    border-style: dashed;
}

/* METİN BİLGİSİ */
.meta-info {
    font-size: 11px;
    color: var(--text-btn);
    margin-bottom: 15px;
    display: flex;
    gap: 15px;
}
.meta-info span strong {
    color: #86efac;
}

html[data-theme="white"] .meta-info span strong {
    color: #16a34a;
}

.action-buttons {
    margin-bottom: 25px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

/* SİBER KIRMIZI YASAKLI KELİME */
.bad-word{
    color:#ff0000;
    font-weight:bold;
    background:rgba(255, 0, 0, 0.1);
    border: 1px solid rgba(255, 0, 0, 0.4);
    padding:1px 4px;
    border-radius:2px;
}

/* NEON BİLDİRİM TOAST */
.toast {
    position: fixed;
    top: -100px;
    right: 20px;
    background: var(--bg-container);
    border: 1px solid var(--accent-color);
    color: var(--text-heading);
    padding: 12px 24px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: bold;
    box-shadow: 0 0 20px var(--accent-glow);
    transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 10000;
}
.toast.show {
    top: 20px;
}

/* WATERMARK */
.watermark{
    position:fixed;
    bottom:30px;
    left:0;
    width:100%;
    text-align:center;
    font-size:60px;
    font-weight:900;
    letter-spacing:20px;
    pointer-events:none;
    user-select:none;
    opacity: 0.03; 
    color: var(--text-heading);
    animation: pulse 4s ease-in-out infinite;
}

@keyframes pulse{
    0%,100%{transform:scale(1); opacity: 0.02;}
    50%{transform:scale(1.02); opacity: 0.05;}
}
</style>
</head>

<body>

<div class="theme-selector">
    <span class="theme-label">TEMA:</span>
    <div class="theme-dot active" style="background: #020204;" onclick="changeTheme('dark', this)" title="Cyber Dark"></div>
    <div class="theme-dot" style="background: #ffffff; border: 1px solid #cbd5e1;" onclick="changeTheme('white', this)" title="Pure White"></div>
    <div class="theme-dot" style="background: #ec4899;" onclick="changeTheme('pink', this)" title="Cyber Pink (Kızlar)"></div>
    <div class="theme-dot" style="background: #2563eb;" onclick="changeTheme('blue', this)" title="Deep Blue (Erkekler)"></div>
    <div class="theme-dot" style="background: #dc2626;" onclick="changeTheme('red', this)" title="Neon Red"></div>
</div>

<div id="toast-notification" class="toast">⚔️ METİN KOPYALANDI!</div>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Boşluk Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım Düzenleyici</button>
</div>

<div class="container">

    <div class="tab-content active">
        <h3>Metni buraya yapıştır aslan parçası</h3>
        <div id="input1" class="input-area" contenteditable="true" oninput="calculateMeta(1)"></div>
        
        <div class="meta-info">
            <span id="char-count-1">Karakter: <strong>0</strong></span>
            <span id="word-count-1">Kelime: <strong>0</strong></span>
        </div>

        <div class="action-buttons">
            <button onclick="cleanSpaces()">Temizle</button>
            <button onclick="copy1()">Kopyala</button>
            <button onclick="clear1()">Sil</button>
        </div>
        <div id="output1" class="output" contenteditable="true"></div>
    </div>

    <div class="tab-content">
        <h3>Metni buraya yapıştır aslan parçası</h3>
        <div id="input2" class="input-area" contenteditable="true" oninput="calculateMeta(2)"></div>

        <div class="meta-info">
            <span id="char-count-2">Karakter: <strong>0</strong></span>
            <span id="word-count-2">Kelime: <strong>0</strong></span>
        </div>

        <div class="action-buttons">
            <button onclick="fixText()">Düzelt</button>
            <button onclick="copy2()">Kopyala</button>
            <button onclick="clear2()">Sil</button>
        </div>
        <div id="output2" class="output" contenteditable="true"></div>
    </div>

</div>

<div class="watermark">TENGRİ</div>

<script>

/* TEMA MOTORU */
function changeTheme(themeName, element) {
    if(themeName === 'dark') {
        document.documentElement.removeAttribute('data-theme');
    } else {
        document.documentElement.setAttribute('data-theme', themeName);
    }
    
    // Aktif daire işaretleme görseli güncellemesi
    document.querySelectorAll('.theme-dot').forEach(dot => dot.classList.remove('active'));
    element.classList.add('active');
}

/* BİLDİRİM TOAST */
function showToast() {
    const toast = document.getElementById("toast-notification");
    toast.classList.add("show");
    setTimeout(() => { toast.classList.remove("show"); }, 2000);
}

/* SAYAÇLAR */
function calculateMeta(tabIndex) {
    const text = document.getElementById(`input${tabIndex}`).innerText;
    const charCount = text.length;
    const wordCount = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
    
    document.getElementById(`char-count-${tabIndex}`).innerHTML = `Karakter: <strong>${charCount}</strong>`;
    document.getElementById(`word-count-${tabIndex}`).innerHTML = `Kelime: <strong>${wordCount}</strong>`;
}

/* TAB GEÇİŞLERI */
function openTab(i){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".tab-content")[i].classList.add("active");
    document.querySelectorAll(".tab-btn")[i].classList.add("active");
}

/* YASAKLI KELİMELER */
const bannedWords = [
    "yüksek kalite", "yüksek kaliteli", "hakiki deri", "gerçek deri", "%100 deri", "% 100 deri",
    "birinci sınıf", "1. kalite", "1. sınıf", "unisex", "1.sınıf", "1.kalite", "1.kalıte",
    "1. kalıte", "1.SINIF", "1. SINIF", "1.KALİTE", "1. KALİTE", "BİRİNCİ SINIF", "YÜKSEK KALİTE", "YÜKSEK KALITE"
];

function escapeRegExp(str){ return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function highlight(text){
    bannedWords.forEach(word=>{
        const pattern = escapeRegExp(word).replace(/\s+/g,"\\s+");
        const reg = new RegExp(pattern,"gi");
        text = text.replace(reg, m => `<span class="bad-word">${m}</span>`);
    });
    return text;
}

/* METİN TEMİZLEME MOTORU */
function cleanGarbageFromText(txt, forceLowercase = false) {
    if (!txt) return "";
    
    let clean = txt
        .replace(/&nbsp;/gi, " ")
        .replace(/nbsp;/gi, " ")
        .replace(/;nbsp/gi, " ")
        .replace(/&nbsp/gi, " ")
        .replace(/\u00A0/g, " ")
        .replace(/&amp;;/gi, " ")
        .replace(/&amp;/gi, " ")
        .replace(/&[^;]+;/g, " ")
        .replace(/&/g, " ")
        .replace(/;/g, " ");

    clean = clean.replace(/[ \t]+/g, " ");

    if (forceLowercase) {
        clean = clean.toLowerCase();
        clean = clean.replace(/(^|[.!?]\s+)([a-zçğıöşü])/g, (m, p1, p2) => p1 + p2.toUpperCase());
    }
    
    return clean;
}

/* ANA DÖNÜŞTÜRÜCÜ METOT (BOLD KORUYUCU) */
function cleanAndStructureDOM(htmlText, forceLowercase = false) {
    if (!htmlText.trim()) return "";

    let sandbox = document.createElement("div");
    sandbox.innerHTML = htmlText;
    
    function traverseAndClean(node) {
        if (node.nodeType === Node.TEXT_NODE) {
            node.textContent = cleanGarbageFromText(node.textContent, forceLowercase);
        } else {
            for (let i = 0; i < node.childNodes.length; i++) {
                traverseAndClean(node.childNodes[i]);
            }
        }
    }
    
    traverseAndClean(sandbox);
    
    let structuralHTML = sandbox.innerHTML
        .replace(/<(div|p|br)[^>]*>/gi, "\n")
        .replace(/<\/(div|p)>/gi, "");
        
    let lines = structuralHTML.split("\n");
    let finalLines = [];
    
    lines.forEach(line => {
        let trimmedLine = line.trim();
        if (trimmedLine !== "" && trimmedLine !== "<br>" && trimmedLine !== "<b></b>" && trimmedLine !== "<strong></strong>") {
            trimmedLine = trimmedLine.replace(/>\s+</g, "><").replace(/[ \t]+/g, " ");
            finalLines.push(trimmedLine);
        }
    });
    
    return highlight(finalLines.join("<br>"));
}

/* KOPYALAYICI VE 14PX BOYUT ENJEKTÖRÜ */
function copyToClipboard(elementId) {
    const element = document.getElementById(elementId);
    const clone = element.cloneNode(true);
    
    // Yasaklı kelime kırmızı işaretlerini temizle
    clone.querySelectorAll('.bad-word').forEach(el => {
        const textNode = document.createTextNode(el.innerText);
        el.parentNode.replaceChild(textNode, el);
    });

    // Kopyalanan HTML metnini her zaman tam olarak 14px yapacak global sarmalayıcı ekle
    let finalFormattedHTML = `<span style="font-size: 14px; font-family: sans-serif; line-height: 1.6;">${clone.innerHTML}</span>`;

    const blob = new Blob([finalFormattedHTML], { type: 'text/html' });
    const textBlob = new Blob([clone.innerText], { type: 'text/plain' });
    const data = [new ClipboardItem({ 'text/html': blob, 'text/plain': textBlob })];
    
    navigator.clipboard.write(data).then(() => { showToast(); });
}

/* TAB 1 - BOŞLUK TEMİZLEME */
function cleanSpaces(){
    let html = document.getElementById("input1").innerHTML;
    document.getElementById("output1").innerHTML = cleanAndStructureDOM(html, false);
}

// Enter tuşuna basıldığında div içinde düzgün alt satır oluşturma standardı
document.getElementById("input1").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        document.execCommand('insertLineBreak', false, null);
        e.preventDefault();
    }
});
document.getElementById("input2").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        document.execCommand('insertLineBreak', false, null);
        e.preventDefault();
    }
});

function copy1(){ copyToClipboard("output1"); }
function clear1(){
    document.getElementById("input1").innerHTML="";
    document.getElementById("output1").innerHTML="";
    calculateMeta(1);
}

/* TAB 2 - YAZIM DÜZENLEME */
function fixText(){
    let html = document.getElementById("input2").innerHTML;
    document.getElementById("output2").innerHTML = cleanAndStructureDOM(html, true);
}

function copy2(){ copyToClipboard("output2"); }
function clear2(){
    document.getElementById("input2").innerHTML="";
    document.getElementById("output2").innerHTML="";
    calculateMeta(2);
}

</script>

</body>
</html>
